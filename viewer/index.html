// ---- structured body renderer --------------------------
// Parse a node body into ## sections, detect each section's kind from its
// Chinese title, render each with a tailored presentation instead of flat md.
function stripWiki(s) { return String(s == null ? '' : s).replace(/\[\[([^\]]+)\]\]/g, '$1'); }
function sxInline(text) { return md.renderInline(stripWiki(text)); }
function sxSlug(s) { return String(s).replace(/[^\w一-龥]+/g, '-').toLowerCase(); }

function detectSectionKind(title) {
  const t = title || '';
  if (/基本信息|事件信息|来源/.test(t)) return 'info';
  if (/对接方式/.test(t)) return 'info';
  if (/协作历史|关键进展|关键交互/.test(t)) return 'timeline';
  if (/参与方立场|立场|动机|利益/.test(t)) return 'stance';
  if (/待办/.test(t)) return 'todos';
  if (/关联节点|相关节点|衍生与关联/.test(t)) return 'noderefs';
  if (/^议程|议程与讨论/.test(t)) return 'agenda';
  if (/^目标|^决定了什么/.test(t)) return 'goals';
  if (/当前状态/.test(t)) return 'status';
  if (/^成员|关键成员|决策人|相关方/.test(t)) return 'members';
  if (/^结论/.test(t)) return 'conclusions';
  if (/踩坑|注意事项/.test(t)) return 'warnings';
  if (/规范|流程|how-to/i.test(t)) return 'rules';
  if (/可借鉴/.test(t)) return 'takeaways';
  if (/核心观点|关键策略|关键知识点/.test(t)) return 'keypoints';
  if (/理由|背景/.test(t)) return 'rationale';
  if (/影响范围/.test(t)) return 'impact';
  if (/^风险|^问题/.test(t)) return 'risks';
  if (/偏好|风格/.test(t)) return 'prefs';
  if (/^历史/.test(t)) return 'history';
  if (/负责什么/.test(t)) return 'responsibilities';
  return 'default';
}

function sxSections(body) {
  const lines = String(body || '').split('\n');
  const sections = [];
  let cur = null;
  for (const line of lines) {
    const h = line.match(/^##\s+(.+)$/);
    if (h) { if (cur) sections.push(cur); cur = { title: h[1].trim(), lines: [] }; continue; }
    if (cur) cur.lines.push(line);
  }
  if (cur) sections.push(cur);
  return sections;
}

// bullets, with 2-space continuation lines folded in
function sxBullets(lines) {
  const items = [];
  let cur = null;
  for (const line of lines) {
    if (/^[-*]\s+/.test(line)) {
      if (cur !== null) items.push(cur);
      cur = line.replace(/^[-*]\s+/, '');
    } else if (cur !== null && /^\s{2,}\S/.test(line)) {
      cur += '\n' + line.replace(/^\s+/, '');
    }
  }
  if (cur !== null) items.push(cur);
  return items;
}
function sxOrdered(lines) {
  const items = [];
  for (const line of lines) {
    const m = line.match(/^\d+\.\s+(.+)$/);
    if (m) items.push(m[1]);
  }
  return items;
}

function sxShell(kind, iconName, title, inner) {
  return `<section class="sx sx-${kind}" id="s-${sxSlug(title)}" data-outline="${esc(title)}">
    <header class="sx-h"><span class="sx-h-icon">${icon(iconName, 13)}</span><h2 class="sx-h-title">${esc(title)}</h2></header>
    <div class="sx-body">${inner}</div>
  </section>`;
}
function sxProse(lines) {
  const txt = stripWiki(lines.join('\n').trim());
  if (!txt) return '<div class="sx-muted">(此节为空)</div>';
  return '<div class="sx-prose prose">' + md.render(txt) + '</div>';
}

function nodeLinkHTML(id) {
  const n = state.byId[id];
  if (!n) return `<span class="nodelink broken">${esc(id)}</span>`;
  return `<a class="nodelink" href="#${esc(id)}" data-id="${esc(id)}"><span class="tdot ${n.type}"></span><span>${esc(n.title)}</span></a>`;
}
function maybeNodeLink(text) {
  const t = String(text).trim().replace(/^\[\[|\]\]$/g, '');
  return state.byId[t] ? nodeLinkHTML(t) : sxInline(t);
}
function sxExtractIds(text) {
  const ids = [];
  let m;
  const wre = /\[\[([^\]]+)\]\]/g;
  while ((m = wre.exec(text)) !== null) ids.push(m[1]);
  if (!ids.length) {
    const bre = new RegExp(ID_RE.source, 'g');
    while ((m = bre.exec(text)) !== null) ids.push(m[0]);
  }
  return ids;
}

function sxInfo(title, lines) {
  const items = sxBullets(lines);
  if (!items.length) return sxShell('info', 'info', title, sxProse(lines));
  const rows = items.map(raw => {
    const ci = raw.search(/[:：]/);
    return ci > -1 ? { k: raw.slice(0, ci).trim(), v: raw.slice(ci + 1).trim() } : { k: '', v: raw };
  });
  return sxShell('info', 'info', title, '<dl class="sx-kv">' + rows.map(r =>
    `<div class="sx-kv-row"><dt>${esc(r.k)}</dt><dd>${sxInline(r.v)}</dd></div>`).join('') + '</dl>');
}

function sxTimeline(title, lines) {
  const items = sxBullets(lines);
  if (!items.length) return sxShell('timeline', 'clock', title, sxProse(lines));
  const rows = items.map(raw => {
    let m = raw.match(/^\*\*(\d{4}-\d{2}-\d{2})\*\*\s*([\s\S]*)$/);
    if (m) return { date: m[1], rest: m[2] };
    m = raw.match(/^(\d{4}-\d{2}-\d{2})\s+([\s\S]*)$/);
    if (m) return { date: m[1], rest: m[2] };
    return { date: '', rest: raw };
  });
  return sxShell('timeline', 'clock', title, '<ul class="sx-tl">' + rows.map(r =>
    `<li class="sx-tl-row"><div class="sx-tl-date"><div class="sx-tl-dot"></div><div class="sx-tl-d1">${esc(r.date || '—')}</div>${r.date ? `<div class="sx-tl-d2">${esc(relTime(r.date))}</div>` : ''}</div><div class="sx-tl-text">${sxInline(r.rest)}</div></li>`
  ).join('') + '</ul>');
}

function sxSplitStance(text) {
  const re = /【(观察|推断|事实|疑问)】/g;
  const segs = [];
  let last = 0, m, curKind = null;
  while ((m = re.exec(text)) !== null) {
    if (curKind) {
      segs.push({ kind: curKind, text: text.slice(last, m.index).trim().replace(/^[,，;；。.]+/, '').trim() });
    } else if (m.index > last) {
      const lead = text.slice(last, m.index).trim();
      if (lead) segs.push({ kind: 'lead', text: lead });
    }
    curKind = m[1];
    last = m.index + m[0].length;
  }
  if (curKind) segs.push({ kind: curKind, text: text.slice(last).trim() });
  else if (last < text.length) {
    const tail = text.slice(last).trim();
    if (tail) segs.push({ kind: 'lead', text: tail });
  }
  return segs;
}
function sxStanceSegs(segs) {
  const cls = { '观察': 'obs', '推断': 'inf', '事实': 'fact', '疑问': 'q' };
  return segs.map(s => s.kind === 'lead'
    ? `<div class="sx-stance-lead">${sxInline(s.text)}</div>`
    : `<div class="sx-stance-item ${s.kind === '观察' ? 'obs' : s.kind === '推断' ? 'inf' : ''}"><span class="sx-stance-chip ${cls[s.kind] || 'obs'}">${esc(s.kind)}</span><span class="sx-stance-text">${sxInline(s.text)}</span></div>`
  ).join('');
}
function sxStance(title, lines) {
  const items = sxBullets(lines);
  if (!items.length) return sxShell('stance', 'eye', title, sxProse(lines));
  const partRe = /^\*\*([^*]+)\*\*\s*[:：]\s*([\s\S]*)$/;
  const isParticipant = items.length > 0 && items.every(it => partRe.test(it));
  if (isParticipant) {
    const parties = items.map(raw => {
      const m = raw.match(partRe);
      return { head: m[1].trim(), segs: sxSplitStance(m[2]) };
    });
    return sxShell('stance', 'people', title, '<div class="sx-stance-grid">' + parties.map(p =>
      `<div class="sx-stance-party"><div class="sx-stance-party-h">${maybeNodeLink(p.head)}</div><div class="sx-stance-list">${sxStanceSegs(p.segs)}</div></div>`
    ).join('') + '</div>');
  }
  return sxShell('stance', 'eye', title, '<div class="sx-stance-list">' + items.map(raw =>
    `<div class="sx-stance-row">${sxStanceSegs(sxSplitStance(raw))}</div>`).join('') + '</div>');
}

function sxTodos(title, lines) {
  const items = sxBullets(lines);
  if (!items.length) return sxShell('todos', 'todo', title, sxProse(lines));
  const rows = items.map(raw => {
    const ddl = raw.match(/ddl\s+(\d{4}-\d{2}-\d{2})/i);
    const body = raw.replace(/[,，]?\s*ddl\s+\d{4}-\d{2}-\d{2}\s*$/i, '').trim();
    const parts = body.split(/\s*[→⇒]\s*|\s*->\s*/);
    return { task: parts[0].trim(), owner: parts.slice(1).join(' → ').trim(), ddl: ddl ? ddl[1] : '' };
  });
  return sxShell('todos', 'todo', title, '<ul class="sx-todos">' + rows.map(r =>
    `<li class="sx-todo"><span class="sx-todo-box"></span><span class="sx-todo-task">${sxInline(r.task)}</span>${r.owner ? `<span class="sx-todo-owner">${icon('arrow', 11)} ${sxInline(r.owner)}</span>` : '<span></span>'}${r.ddl ? `<span class="sx-todo-ddl">${icon('clock', 11)} ${esc(r.ddl)}<span class="sx-todo-rel">· ${esc(relTime(r.ddl))}</span></span>` : '<span></span>'}</li>`
  ).join('') + '</ul>');
}

function sxNoderefs(title, lines) {
  const items = sxBullets(lines);
  if (!items.length) {
    // plain-paragraph 关联节点 (common in real nodes) — pull ids out as chips
    const ids = sxExtractIds(lines.join('\n'));
    if (ids.length) return sxShell('noderefs', 'link', title,
      '<div class="sx-refs"><div class="sx-refs-row"><div></div>' +
      '<div class="sx-refs-chips">' + ids.map(nodeLinkHTML).join('') + '</div></div></div>');
    return sxShell('noderefs', 'link', title, sxProse(lines));
  }
  const rows = items.map(raw => {
    const ci = raw.search(/[:：]/);
    let label = '', body = raw;
    if (ci > -1) { label = raw.slice(0, ci).trim(); body = raw.slice(ci + 1).trim(); }
    return { label, ids: sxExtractIds(body), body };
  });
  return sxShell('noderefs', 'link', title, '<div class="sx-refs">' + rows.map(r =>
    `<div class="sx-refs-row">${r.label ? `<div class="sx-refs-label">${esc(r.label)}</div>` : '<div></div>'}<div class="sx-refs-chips">${r.ids.length ? r.ids.map(nodeLinkHTML).join('') : `<span class="sx-muted">${sxInline(r.body)}</span>`}</div></div>`
  ).join('') + '</div>');
}

function sxAgenda(title, lines) {
  const items = sxOrdered(lines);
  if (!items.length) return sxGeneric('agenda', 'list', title, lines);
  return sxShell('agenda', 'list', title, '<ol class="sx-numbered">' + items.map((t, i) =>
    `<li><span class="sx-num">${String(i + 1).padStart(2, '0')}</span><span class="sx-num-text">${sxInline(t)}</span></li>`).join('') + '</ol>');
}

function sxGoals(title, lines) {
  const ord = sxOrdered(lines);
  const items = ord.length ? ord : sxBullets(lines);
  if (!items.length) return sxShell('goals', 'target', title, sxProse(lines));
  return sxShell('goals', 'target', title, '<ol class="sx-goals">' + items.map((t, i) =>
    `<li class="sx-goal"><span class="sx-num">${String(i + 1).padStart(2, '0')}</span><span class="sx-goal-text">${sxInline(t)}</span></li>`).join('') + '</ol>');
}

function sxKeypoints(title, lines) {
  const ord = sxOrdered(lines);
  const items = ord.length ? ord : sxBullets(lines);
  if (!items.length) return sxShell('keypoints', 'star', title, sxProse(lines));
  const rows = items.map(raw => {
    const m = raw.match(/^\*\*([^*]+)\*\*\s*(?:[:：]|—|-)?\s*([\s\S]*)$/);
    return (m && m[1]) ? { lead: m[1], rest: m[2] } : { lead: '', rest: raw };
  });
  return sxShell('keypoints', 'star', title, '<ol class="sx-keypoints">' + rows.map((r, i) =>
    `<li class="sx-keypoint"><span class="sx-num">${String(i + 1).padStart(2, '0')}</span><div class="sx-kp-body">${r.lead ? `<div class="sx-kp-lead">${esc(r.lead)}</div>` : ''}${r.rest ? `<div class="sx-kp-rest">${sxInline(r.rest)}</div>` : ''}</div></li>`
  ).join('') + '</ol>');
}

function sxStatus(title, lines) {
  let items = sxBullets(lines);
  if (!items.length) {
    const t = lines.join(' ').trim();
    if (t) items = [t];
  }
  if (!items.length) return sxShell('status', 'bolt', title, sxProse(lines));
  return sxShell('status', 'bolt', title, '<div class="sx-status">' + items.map(raw => {
    const txt = raw.trim();
    let st = 'on';
    if (/已被取代|superseded|已下线|deprecated/i.test(txt)) st = 'super';
    else if (/草案|draft|计划/i.test(txt)) st = 'draft';
    else if (/陈旧|stale/i.test(txt)) st = 'stale';
    return `<div class="sx-status-pill sx-state-${st}"><span class="sx-status-dot"></span><span>${sxInline(txt)}</span></div>`;
  }).join('') + '</div>');
}

function sxMembers(title, lines) {
  const items = sxBullets(lines);
  if (!items.length) return sxShell('members', 'people', title, sxProse(lines));
  const rows = items.map(raw => {
    const ci = raw.search(/[:：]/);
    if (ci > -1) {
      const role = raw.slice(0, ci).trim();
      const rest = raw.slice(ci + 1).trim();
      return { role, rest, ids: sxExtractIds(rest) };
    }
    return { role: '', rest: raw, ids: sxExtractIds(raw) };
  });
  return sxShell('members', 'people', title, '<div class="sx-members">' + rows.map(r =>
    `<div class="sx-member-row"><div class="sx-member-role">${esc(r.role || '—')}</div><div class="sx-member-people">${r.ids.length ? r.ids.map(nodeLinkHTML).join(' ') : sxInline(r.rest)}</div></div>`
  ).join('') + '</div>');
}

function sxConclusions(title, lines) {
  const items = sxBullets(lines);
  if (!items.length) return sxShell('conclusions', 'flag', title, sxProse(lines));
  const rows = items.map(raw => {
    const m = raw.match(/^\*\*([^*]+)\*\*\s*[:：]\s*([\s\S]*)$/);
    return m ? { lead: m[1], rest: m[2] } : { lead: '', rest: raw };
  });
  return sxShell('conclusions', 'flag', title, '<div class="sx-conclusions">' + rows.map(r =>
    `<div class="sx-conclusion">${r.lead ? `<div class="sx-conclusion-lead">${esc(r.lead)}</div>` : '<div></div>'}<div class="sx-conclusion-text">${sxInline(r.rest)}</div></div>`
  ).join('') + '</div>');
}

function sxWarnings(title, lines) {
  const items = sxBullets(lines);
  if (!items.length) return sxShell('warnings', 'warn', title, sxProse(lines));
  return sxShell('warnings', 'warn', title, '<ul class="sx-warns">' + items.map(t =>
    `<li class="sx-warn">${icon('warn', 13)}<span>${sxInline(t)}</span></li>`).join('') + '</ul>');
}

function sxTakeaways(title, lines) {
  const items = sxBullets(lines);
  if (!items.length) return sxShell('takeaways', 'bolt', title, sxProse(lines));
  return sxShell('takeaways', 'bolt', title, '<ul class="sx-takeaways">' + items.map(t =>
    `<li class="sx-takeaway"><span class="sx-take-mark">✓</span><span>${sxInline(t)}</span></li>`).join('') + '</ul>');
}

function sxRisks(title, lines) {
  const items = sxBullets(lines);
  if (!items.length) return sxShell('risks', 'warn', title, sxProse(lines));
  return sxShell('risks', 'warn', title, '<ul class="sx-risks">' + items.map(t =>
    `<li class="sx-risk"><span class="sx-risk-mark">▸</span><span>${sxInline(t)}</span></li>`).join('') + '</ul>');
}

function sxGeneric(kind, iconName, title, lines) {
  const ord = sxOrdered(lines);
  const bul = sxBullets(lines);
  const items = bul.length ? bul : ord;
  if (!items.length) return sxShell(kind, iconName, title, sxProse(lines));
  return sxShell(kind, iconName, title, '<ul class="sx-bullets">' + items.map(t =>
    `<li><span class="sx-bullet-dot"></span><span>${sxInline(t)}</span></li>`).join('') + '</ul>');
}

function renderSection(title, lines) {
  switch (detectSectionKind(title)) {
    case 'info': return sxInfo(title, lines);
    case 'timeline': return sxTimeline(title, lines);
    case 'stance': return sxStance(title, lines);
    case 'todos': return sxTodos(title, lines);
    case 'noderefs': return sxNoderefs(title, lines);
    case 'agenda': return sxAgenda(title, lines);
    case 'goals': return sxGoals(title, lines);
    case 'status': return sxStatus(title, lines);
    case 'members': return sxMembers(title, lines);
    case 'conclusions': return sxConclusions(title, lines);
    case 'warnings': return sxWarnings(title, lines);
    case 'takeaways': return sxTakeaways(title, lines);
    case 'keypoints': return sxKeypoints(title, lines);
    case 'risks': return sxRisks(title, lines);
    case 'rationale': return sxGeneric('rationale', 'quote', title, lines);
    case 'impact': return sxGeneric('impact', 'arrowout', title, lines);
    case 'prefs': return sxGeneric('prefs', 'star', title, lines);
    case 'history': return sxGeneric('history', 'refresh', title, lines);
    case 'responsibilities': return sxGeneric('responsibilities', 'check', title, lines);
    case 'rules': return sxGeneric('rules', 'book', title, lines);
    default: return sxGeneric('default', 'bullet', title, lines);
  }
}

function renderStructured(body) {
  const secs = sxSections(body);
  if (!secs.length) return '<div class="prose">' + md.render(stripWiki(body || '')) + '</div>';
  return '<div class="sx-doc">' + secs.map(s => renderSection(s.title, s.lines)).join('') + '</div>';
}

// structured render with a safety net: any error falls back to flat markdown
function renderBody(full) {
  try {
    return renderStructured(full.body || '');
  } catch (e) {
    console.warn('structured render failed; flat markdown fallback', e);
    return '<div class="prose">' + (full.html || '') + '</div>';
  }
}

// ---- wire global UI events -----------------------------
D.sideFilter.addEventListener('input', (e) => {
  state.sideFilterQ = e.target.value;
  renderSidebar();
});
D.sideFilterClear.addEventListener('click', () => {
  state.sideFilterQ = '';
  D.sideFilter.value = '';
  renderSidebar();
  D.sideFilter.focus();
});
D.sideFilter.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    if (state.sideFilterQ) {
      state.sideFilterQ = '';
      D.sideFilter.value = '';
      renderSidebar();
    } else {
      D.sideFilter.blur();
    }
  }
});
D.btnBack.addEventListener('click', navBack);
D.btnFwd.addEventListener('click', navFwd);
D.btnSearch.addEventListener('click', openPalette);
D.btnSettings.addEventListener('click', openSettings);
D.btnCopy.addEventListener('click', () => {
  const e = currentEntry();
  if (e?.kind === 'node') {
    navigator.clipboard?.writeText(e.id).catch(() => {});
  }
});
D.scIndex.addEventListener('click', () => navOpen({ kind: 'raw', path: KB + 'INDEX.md', label: '主索引 INDEX' }));
D.scDash.addEventListener('click', () => navOpen({ kind: 'raw', path: KB + 'dashboard.md', label: '工作看板' }));
document.querySelectorAll('.rail-tab').forEach(el => {
  el.addEventListener('click', () => {
    state.rail = el.dataset.rail;
    const cur = currentEntry();
    if (cur?.kind === 'node') renderRail(cur.id);
    else document.querySelectorAll('.rail-tab').forEach(t => t.classList.toggle('on', t === el));
  });
});

// keyboard
document.addEventListener('keydown', (e) => {
  const tag = (e.target.tagName || '').toLowerCase();
  const inField = tag === 'input' || tag === 'textarea';
  if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k') { e.preventDefault(); state.paletteOpen ? closePalette() : openPalette(); return; }
  if ((e.metaKey || e.ctrlKey) && e.key === ',') { e.preventDefault(); state.settingsOpen ? closeSettings() : openSettings(); return; }
  if ((e.metaKey || e.ctrlKey) && e.key === '\\') { e.preventDefault(); setSetting('theme', state.settings.theme === 'dark' ? 'light' : 'dark'); return; }
  if ((e.metaKey || e.ctrlKey) && e.key === '[') { e.preventDefault(); navBack(); return; }
  if ((e.metaKey || e.ctrlKey) && e.key === ']') { e.preventDefault(); navFwd(); return; }
  if (inField || state.paletteOpen) return;
  if (e.key === '/') { e.preventDefault(); D.sideFilter.focus(); D.sideFilter.select(); return; }
  if (e.key === 'j' || e.key === 'k') {
    e.preventDefault();
    const all = state.nodes;
    const cur = currentEntry();
    const i = cur?.kind === 'node' ? all.findIndex(n => n.id === cur.id) : -1;
    const next = e.key === 'j' ? Math.min(i + 1, all.length - 1) : Math.max(i - 1, 0);
    if (all[next]) navOpen({ kind: 'node', id: all[next].id });
  }
});

// hash routing
window.addEventListener('hashchange', () => {
  const h = decodeURIComponent(location.hash.replace(/^#/, ''));
  if (h && state.byId[h]) {
    const cur = currentEntry();
    if (!(cur?.kind === 'node' && cur.id === h)) {
      navOpen({ kind: 'node', id: h });
    }
  }
});

// ---- boot ----------------------------------------------
async function boot() {
  applySettings();
  let text;
  try {
    const r = await fetch(KB + 'INDEX.md');
    if (!r.ok) throw new Error('HTTP ' + r.status);
    text = await r.text();
  } catch (e) {
    D.readerBody.innerHTML = `<div class="err">
      <strong>读不到 INDEX.md。</strong><br>
      请用 <code>~/byteworker/bin/browse.sh</code> 启动 —— 它起一个本地静态服务器,把 viewer 挂在 /app、把知识库数据挂在 /kb。<br>
      <span style="color:var(--ink-4)">原始错误:${esc(e.message)}</span>
    </div>`;
    D.scanStatus.textContent = '未连接';
    return;
  }
  state.nodes = parseIndex(text);
  for (const n of state.nodes) state.byId[n.id] = n;
  for (const t of TYPE_ORDER) state.byType[t] = state.nodes.filter(n => n.type === t);
  D.brandSub.textContent = `${state.nodes.length} 个节点 · 只读`;
  renderSidebar();

  // initial route: hash or first node
  const hash = decodeURIComponent(location.hash.replace(/^#/, ''));
  if (hash && state.byId[hash]) navOpen({ kind: 'node', id: hash });
  else updateScanStatus();

  // background scan
  scanAll().catch(e => console.warn('scan failed', e));
}
boot();
</script>
</body>
