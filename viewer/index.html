<!doctype html>
<html lang="zh" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>byteworker 知识库</title>
<style>
/* ========================================================================
   byteworker viewer — Workspace (entity-graph) layout
   Apple HIG visual language · per-type chips · light + dark
   Single-file, vanilla JS (no React/Babel), only markdown-it as a vendor.
   ======================================================================== */
:root {
  --font-ui: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC",
             "Microsoft YaHei", "Segoe UI", sans-serif;
  --font-display: -apple-system, BlinkMacSystemFont, "SF Pro Display",
                  "PingFang SC", "Microsoft YaHei", sans-serif;
  --font-mono: "SF Mono", "JetBrains Mono", ui-monospace, "Cascadia Mono",
               Menlo, Consolas, monospace;

  --bg: #f5f5f7;
  --bg-elev: #ffffff;
  --bg-sidebar: rgba(246, 246, 248, 0.72);
  --bg-rail: #fafafa;
  --bg-hover: rgba(0, 0, 0, 0.04);
  --bg-active: rgba(10, 132, 255, 0.10);
  --bg-chip: rgba(0, 0, 0, 0.045);
  --bg-code: rgba(0, 0, 0, 0.045);
  --bg-quote: rgba(0, 0, 0, 0.025);

  --ink: #1d1d1f;
  --ink-2: #424246;
  --ink-3: #6e6e73;
  --ink-4: #8e8e93;
  --line: rgba(0, 0, 0, 0.08);
  --line-strong: rgba(0, 0, 0, 0.14);
  --divider: rgba(0, 0, 0, 0.06);

  --accent: #0a84ff;
  --accent-tint: rgba(10, 132, 255, 0.12);

  --warn: oklch(0.68 0.13 75);
  --good: oklch(0.58 0.13 150);

  --c-person:   oklch(0.55 0.13 250);
  --c-project:  oklch(0.55 0.13 150);
  --c-area:     oklch(0.55 0.10 80);
  --c-org:      oklch(0.55 0.14 305);
  --c-event:    oklch(0.55 0.10 210);
  --c-decision: oklch(0.55 0.16 25);
  --c-reading:  oklch(0.55 0.07 240);

  --c-person-tint:   oklch(0.95 0.04 250);
  --c-project-tint:  oklch(0.95 0.04 150);
  --c-area-tint:     oklch(0.95 0.04 80);
  --c-org-tint:      oklch(0.95 0.04 305);
  --c-event-tint:    oklch(0.95 0.03 210);
  --c-decision-tint: oklch(0.95 0.04 25);
  --c-reading-tint:  oklch(0.95 0.02 240);

  --shadow-card: 0 1px 0 rgba(0,0,0,0.04), 0 1px 3px rgba(0,0,0,0.04);
  --shadow-pop:  0 12px 32px rgba(0,0,0,0.16), 0 2px 8px rgba(0,0,0,0.08);

  --duration: 180ms;
  --duration-fast: 120ms;
}
[data-theme="dark"] {
  --bg: #1c1c1e;
  --bg-elev: #2c2c2e;
  --bg-sidebar: rgba(28, 28, 30, 0.72);
  --bg-rail: #232325;
  --bg-hover: rgba(255, 255, 255, 0.06);
  --bg-active: rgba(10, 132, 255, 0.18);
  --bg-chip: rgba(255, 255, 255, 0.07);
  --bg-code: rgba(255, 255, 255, 0.07);
  --bg-quote: rgba(255, 255, 255, 0.04);

  --ink: #f5f5f7;
  --ink-2: #d1d1d6;
  --ink-3: #98989d;
  --ink-4: #6e6e73;
  --line: rgba(255, 255, 255, 0.08);
  --line-strong: rgba(255, 255, 255, 0.16);
  --divider: rgba(255, 255, 255, 0.06);

  --accent: #0a84ff;
  --accent-tint: rgba(10, 132, 255, 0.22);

  --c-person:   oklch(0.75 0.13 250);
  --c-project:  oklch(0.78 0.14 150);
  --c-area:     oklch(0.80 0.11 80);
  --c-org:      oklch(0.76 0.14 305);
  --c-event:    oklch(0.78 0.10 210);
  --c-decision: oklch(0.74 0.16 25);
  --c-reading:  oklch(0.78 0.05 240);

  --c-person-tint:   oklch(0.32 0.06 250);
  --c-project-tint:  oklch(0.32 0.06 150);
  --c-area-tint:     oklch(0.32 0.05 80);
  --c-org-tint:      oklch(0.32 0.06 305);
  --c-event-tint:    oklch(0.32 0.04 210);
  --c-decision-tint: oklch(0.32 0.06 25);
  --c-reading-tint:  oklch(0.30 0.02 240);

  --shadow-card: 0 1px 0 rgba(255,255,255,0.04), 0 1px 3px rgba(0,0,0,0.4);
  --shadow-pop:  0 16px 40px rgba(0,0,0,0.55), 0 2px 8px rgba(0,0,0,0.4);
}

* { box-sizing: border-box; }
html, body { margin: 0; height: 100%; }
body {
  font-family: var(--font-ui);
  font-size: 14px;
  line-height: 1.55;
  color: var(--ink);
  background: var(--bg);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}
button { font: inherit; color: inherit; background: none; border: 0; padding: 0; cursor: pointer; }
input { font: inherit; color: inherit; }
a { color: inherit; text-decoration: none; }
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-thumb { background: var(--line-strong); border-radius: 10px; border: 2px solid transparent; background-clip: padding-box; }
::-webkit-scrollbar-thumb:hover { background: var(--ink-4); background-clip: padding-box; border: 2px solid transparent; }
::-webkit-scrollbar-track { background: transparent; }

/* ---- app shell -------------------------------------------------- */
.app {
  display: grid;
  grid-template-rows: 42px 1fr;
  grid-template-columns: 244px 1fr 320px;
  height: 100vh;
  overflow: hidden;
}

.titlebar {
  grid-column: 1 / -1;
  display: flex; align-items: center; gap: 8px;
  background: var(--bg-sidebar);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  border-bottom: 1px solid var(--line);
  padding: 0 12px;
  user-select: none;
  z-index: 10;
}
.title-brand {
  display: flex; align-items: center; gap: 8px;
  font-size: 12.5px; color: var(--ink-2); font-weight: 600;
  letter-spacing: -0.005em;
}
.title-brand .mark {
  width: 22px; height: 22px; border-radius: 6px;
  background: linear-gradient(135deg, var(--accent), color-mix(in srgb, var(--accent) 60%, var(--c-org)));
  color: white; display: flex; align-items: center; justify-content: center;
  font-family: var(--font-mono); font-weight: 700; font-size: 11px;
}
.title-brand .sub { color: var(--ink-4); font-weight: 500; font-family: var(--font-mono); font-size: 11px; }

.title-spacer { flex: 1; }

.nav-arrows { display: flex; gap: 2px; }
.nav-arrow {
  width: 26px; height: 26px; border-radius: 6px;
  display: inline-flex; align-items: center; justify-content: center;
  color: var(--ink-3);
}
.nav-arrow:hover { background: var(--bg-hover); color: var(--ink); }
.nav-arrow:disabled { color: var(--ink-4); opacity: 0.4; cursor: default; }
.nav-arrow:disabled:hover { background: transparent; }

.tbtn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  height: 26px; min-width: 26px; padding: 0 9px;
  border-radius: 6px; font-size: 12px;
  color: var(--ink-2);
  transition: background var(--duration-fast);
}
.tbtn:hover { background: var(--bg-hover); color: var(--ink); }
.tbtn svg { width: 13px; height: 13px; flex-shrink: 0; }
.tbtn .kbd { background: rgba(0,0,0,0.04); border-color: transparent; }
[data-theme="dark"] .tbtn .kbd { background: rgba(255,255,255,0.06); }

.kbd {
  display: inline-flex; align-items: center; justify-content: center;
  min-width: 14px; height: 16px; padding: 0 4px;
  font-family: var(--font-mono); font-size: 10px;
  background: var(--bg-chip); border: 1px solid var(--line);
  border-radius: 3px; color: var(--ink-3);
}

/* ---- sidebar --------------------------------------------------- */
.sidebar {
  background: var(--bg-sidebar);
  backdrop-filter: blur(20px);
  border-right: 1px solid var(--line);
  display: flex; flex-direction: column; overflow: hidden;
}
.side-search {
  margin: 10px 12px 6px;
  display: flex; align-items: center; gap: 8px;
  padding: 6px 10px; border-radius: 7px;
  background: var(--bg-elev);
  border: 1px solid var(--line);
  color: var(--ink-3); font-size: 12px; cursor: pointer;
  transition: border-color var(--duration-fast);
}
.side-search:hover { border-color: var(--line-strong); }
.side-search .placeholder { flex: 1; text-align: left; }

.side-filter {
  margin: 0 12px 8px;
  display: flex; align-items: center; gap: 6px;
  padding: 5px 10px; border-radius: 7px;
  background: var(--bg-elev);
  border: 1px solid var(--line);
  font-size: 12.5px;
  transition: border-color var(--duration-fast), box-shadow var(--duration-fast);
}
.side-filter:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-tint); }
.side-filter svg { color: var(--ink-4); flex-shrink: 0; }
.side-filter input {
  flex: 1; border: 0; outline: 0; background: none;
  font-family: var(--font-ui); font-size: 12.5px; color: var(--ink);
  min-width: 0;
}
.side-filter input::placeholder { color: var(--ink-4); }
.side-filter .clear {
  width: 16px; height: 16px; border-radius: 50%;
  background: var(--bg-chip); color: var(--ink-3);
  display: none; align-items: center; justify-content: center; flex-shrink: 0;
  cursor: pointer;
}
.side-filter.has-q .clear { display: inline-flex; }
.side-filter .clear:hover { background: var(--line-strong); color: var(--ink); }

/* group: showing N of M with reveal */
.type-group-more {
  display: block; width: 100%; text-align: left;
  padding: 4px 14px 6px 30px;
  font-size: 11.5px; color: var(--ink-3);
  cursor: pointer;
  font-family: var(--font-mono);
}
.type-group-more:hover { color: var(--accent); background: var(--bg-hover); }
.type-group.pinned .type-group-h .label { color: var(--ink-2); }

.side-shortcuts { padding: 0 6px 4px; display: flex; flex-direction: column; gap: 1px; }
.side-shortcut {
  display: flex; align-items: center; gap: 8px;
  padding: 5px 10px; border-radius: 6px; font-size: 12.5px;
  color: var(--ink-2); cursor: pointer; width: 100%; text-align: left;
}
.side-shortcut:hover { background: var(--bg-hover); color: var(--ink); }
.side-shortcut.on { background: var(--accent-tint); color: var(--accent); font-weight: 500; }
.side-shortcut svg { width: 13px; height: 13px; flex-shrink: 0; color: var(--ink-4); }
.side-shortcut.on svg { color: var(--accent); }

.side-scroll { flex: 1; overflow-y: auto; padding: 4px 0 24px; }

.type-group { border-top: 1px solid var(--divider); padding: 2px 0; }
.type-group:first-child { border-top: 0; }
.type-group-h {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 14px; cursor: pointer; width: 100%; text-align: left;
  font-size: 11.5px; color: var(--ink-2); font-weight: 600;
}
.type-group-h:hover { background: var(--bg-hover); }
.type-group-h .chev {
  display: inline-block; width: 8px; color: var(--ink-4);
  transition: transform var(--duration); font-family: var(--font-mono); font-size: 10px;
}
.type-group.open .type-group-h .chev { transform: rotate(90deg); }
.type-group-h .label { flex: 1; }
.type-group-h .count { font-family: var(--font-mono); font-size: 10.5px; color: var(--ink-4); }

.type-group-body { padding: 1px 0 4px; display: none; }
.type-group.open .type-group-body { display: block; }

.entity-row {
  display: flex; align-items: center; gap: 6px;
  padding: 4px 14px 4px 30px;
  font-size: 12.5px; color: var(--ink-2);
  cursor: pointer; border-left: 2px solid transparent;
  white-space: nowrap; overflow: hidden;
  width: 100%; text-align: left;
}
.entity-row:hover { background: var(--bg-hover); color: var(--ink); }
.entity-row.on {
  background: var(--accent-tint); color: var(--accent);
  border-left-color: var(--accent); font-weight: 500;
}
.entity-row .title { flex: 1; overflow: hidden; text-overflow: ellipsis; min-width: 0; }
.entity-row .badge {
  font-family: var(--font-mono); font-size: 9.5px; padding: 1px 4px;
  border-radius: 3px; background: var(--bg-chip); color: var(--ink-4);
  flex-shrink: 0;
}
.entity-row.stale .badge { background: color-mix(in oklch, var(--warn) 18%, transparent); color: var(--warn); }

.side-footer {
  padding: 8px 14px;
  border-top: 1px solid var(--divider);
  font-size: 10.5px; color: var(--ink-4);
  font-family: var(--font-mono);
  display: flex; align-items: center; gap: 6px;
}
.side-footer .dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--good); flex-shrink: 0;
  animation: pulse 1.5s ease-in-out infinite;
}
.side-footer .dot.ready { animation: none; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

/* ---- reader --------------------------------------------------- */
.reader-wrap {
  background: var(--bg-elev);
  display: flex; flex-direction: column; min-width: 0;
  overflow: hidden;
}
.reader-toolbar {
  height: 40px; display: flex; align-items: center; gap: 4px;
  padding: 0 16px; border-bottom: 1px solid var(--divider);
  flex-shrink: 0;
}
.crumbs { display: flex; align-items: center; gap: 2px; flex: 1; min-width: 0; overflow: hidden; }
.crumb {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 4px 8px; border-radius: 5px;
  font-size: 12px; color: var(--ink-3);
  max-width: 200px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  flex-shrink: 0;
}
.crumb:hover { background: var(--bg-hover); color: var(--ink); }
.crumb.on { color: var(--ink); font-weight: 500; }
.crumb-sep { color: var(--ink-4); font-size: 11px; padding: 0 2px; }

.reader-body { flex: 1; overflow-y: auto; }
.reader-inner {
  max-width: var(--reader-w, 760px); margin: 0 auto;
  padding: var(--reader-py, 36px) var(--reader-px, 56px) 100px;
}
.reader-eyebrow {
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  margin-bottom: 8px;
  font-size: 12px; color: var(--ink-3);
}
.reader-eyebrow .id { font-family: var(--font-mono); font-size: 11.5px; }
.reader-title {
  font-family: var(--font-display);
  font-size: 28px; font-weight: 700; line-height: 1.18;
  letter-spacing: -0.018em; margin: 6px 0 12px;
}
.reader-tldr {
  font-size: 14.5px; line-height: 1.6; color: var(--ink-2);
  padding: 12px 16px; background: var(--bg-chip); border-radius: 8px;
  border-left: 3px solid var(--accent);
  margin: 8px 0 26px;
}
.reader-tldr strong { color: var(--ink); margin-right: 4px; font-weight: 600; }

/* ---- prose --------------------------------------------------- */
.prose { color: var(--ink); font-size: 14.5px; line-height: 1.7; }
.prose h1 { font-family: var(--font-display); font-size: 24px; font-weight: 700; letter-spacing: -0.01em; margin: 0 0 0.6em; line-height: 1.2; }
.prose h2 { font-family: var(--font-display); font-size: 17px; font-weight: 600; margin: 1.8em 0 0.5em; padding-top: 0.5em; border-top: 1px solid var(--divider); letter-spacing: -0.005em; }
.prose h2:first-child { border-top: 0; padding-top: 0; margin-top: 0; }
.prose h3 { font-size: 15px; font-weight: 600; margin: 1.4em 0 0.4em; }
.prose h4 { font-size: 13.5px; font-weight: 600; margin: 1.1em 0 0.3em; color: var(--ink-2); }
.prose p { margin: 0.6em 0; text-wrap: pretty; }
.prose ul, .prose ol { padding-left: 1.4em; margin: 0.5em 0; }
.prose li { margin: 0.2em 0; }
.prose code {
  font-family: var(--font-mono); font-size: 0.88em;
  background: var(--bg-code); padding: 1px 5px; border-radius: 4px;
}
.prose pre {
  font-family: var(--font-mono); font-size: 12.5px; line-height: 1.5;
  background: var(--bg-code); padding: 12px 14px; border-radius: 8px;
  overflow-x: auto; margin: 0.8em 0;
}
.prose pre code { background: none; padding: 0; }
.prose blockquote {
  margin: 0.8em 0; padding: 0.5em 14px;
  border-left: 3px solid var(--accent);
  background: var(--bg-quote);
  color: var(--ink-2); border-radius: 0 6px 6px 0;
}
.prose blockquote p { margin: 0.3em 0; }
.prose blockquote strong:first-child { color: var(--accent); }
.prose table {
  border-collapse: collapse; font-size: 13px; margin: 0.8em 0;
  display: block; overflow-x: auto; max-width: 100%;
}
.prose th, .prose td { border: 1px solid var(--line); padding: 6px 10px; text-align: left; vertical-align: top; }
.prose th { background: var(--bg-chip); font-weight: 600; }
.prose a { color: var(--accent); border-bottom: 1px solid color-mix(in srgb, var(--accent) 30%, transparent); }
.prose hr { border: 0; border-top: 1px solid var(--divider); margin: 1.5em 0; }
.prose img { max-width: 100%; border-radius: 6px; }

/* ---- type chip / dot / badge ------------------------------- */
.tchip {
  display: inline-flex; align-items: center; gap: 4px;
  font-family: var(--font-mono); font-size: 10.5px; font-weight: 600;
  letter-spacing: 0.02em; text-transform: uppercase;
  padding: 2px 7px; border-radius: 4px; line-height: 1.4;
  white-space: nowrap;
}
.tchip::before { content: ""; width: 6px; height: 6px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
.tchip.person   { color: var(--c-person);   background: var(--c-person-tint); }
.tchip.project  { color: var(--c-project);  background: var(--c-project-tint); }
.tchip.area     { color: var(--c-area);     background: var(--c-area-tint); }
.tchip.org      { color: var(--c-org);      background: var(--c-org-tint); }
.tchip.event    { color: var(--c-event);    background: var(--c-event-tint); }
.tchip.decision { color: var(--c-decision); background: var(--c-decision-tint); }
.tchip.reading  { color: var(--c-reading);  background: var(--c-reading-tint); }

.tdot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; display: inline-block; }
.tdot.person   { background: var(--c-person); }
.tdot.project  { background: var(--c-project); }
.tdot.area     { background: var(--c-area); }
.tdot.org      { background: var(--c-org); }
.tdot.event    { background: var(--c-event); }
.tdot.decision { background: var(--c-decision); }
.tdot.reading  { background: var(--c-reading); }

.status {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 10.5px; font-weight: 600; letter-spacing: 0.02em;
  padding: 2px 6px; border-radius: 4px; text-transform: uppercase;
  font-family: var(--font-mono);
}
.status::before { content: ""; width: 5px; height: 5px; border-radius: 50%; background: currentColor; }
.status.current    { color: var(--good); background: color-mix(in oklch, var(--good) 12%, transparent); }
.status.stale      { color: var(--warn); background: color-mix(in oklch, var(--warn) 16%, transparent); }
.status.superseded { color: var(--ink-3); background: var(--bg-chip); }

.tag {
  display: inline-flex; align-items: center;
  font-family: var(--font-mono); font-size: 11px;
  padding: 1px 7px; border-radius: 4px;
  background: var(--bg-chip); color: var(--ink-2);
  white-space: nowrap;
}

.nodelink {
  display: inline-flex; align-items: baseline; gap: 4px;
  font-family: var(--font-mono); font-size: 0.92em;
  color: var(--accent);
  border-bottom: 1px dotted color-mix(in srgb, var(--accent) 50%, transparent);
  padding: 0 2px; border-radius: 3px;
  white-space: nowrap;
  transition: background var(--duration-fast);
}
.nodelink:hover { background: var(--accent-tint); border-bottom-color: var(--accent); }
.nodelink.broken {
  color: var(--ink-4); border-bottom-color: transparent;
  text-decoration: line-through;
}
.nodelink .tdot { transform: translateY(1px); }

/* ---- right rail (entity graph) ----------------------------- */
.rail {
  background: var(--bg-rail);
  border-left: 1px solid var(--line);
  display: flex; flex-direction: column; overflow: hidden;
}
.rail-tabs {
  display: flex; padding: 6px 8px 0;
  border-bottom: 1px solid var(--divider);
  gap: 2px;
  flex-shrink: 0;
}
.rail-tab {
  flex: 1;
  padding: 8px 6px;
  font-size: 11.5px;
  color: var(--ink-3);
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  display: flex; align-items: center; justify-content: center; gap: 5px;
}
.rail-tab:hover { color: var(--ink); }
.rail-tab.on { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }
.rail-tab .count { font-family: var(--font-mono); font-size: 10px; opacity: 0.7; }

.rail-scroll { flex: 1; overflow-y: auto; padding: 14px 16px 30px; }

.rail-h {
  font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em;
  color: var(--ink-4); margin: 16px 0 8px;
  display: flex; align-items: center; justify-content: space-between;
  gap: 6px;
}
.rail-h:first-child { margin-top: 0; }
.rail-h .count { font-family: var(--font-mono); }

.rail-subh {
  font-size: 10.5px; color: var(--ink-4); margin: 8px 0 4px;
  font-family: var(--font-mono);
  display: flex; align-items: center; gap: 5px;
}

.rail-group { display: flex; flex-direction: column; gap: 4px; }
.rail-card {
  display: flex; flex-direction: column; gap: 3px;
  padding: 8px 10px;
  border: 1px solid var(--line); border-radius: 6px;
  background: var(--bg-elev);
  cursor: pointer;
  transition: background var(--duration-fast), border-color var(--duration-fast);
  text-align: left;
}
.rail-card:hover { border-color: var(--line-strong); background: var(--bg-hover); }
.rail-card-top { display: flex; align-items: center; gap: 6px; }
.rail-card-title { font-size: 12px; font-weight: 600; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; }
.rail-card-tldr {
  font-size: 11px; color: var(--ink-3); line-height: 1.4;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}

.rail-meta { font-size: 11.5px; color: var(--ink-2); }
.rail-meta .row {
  display: flex; gap: 10px; padding: 6px 0;
  border-bottom: 1px dashed var(--divider);
}
.rail-meta .row:last-child { border-bottom: 0; }
.rail-meta .k {
  color: var(--ink-4); font-size: 10px; text-transform: uppercase;
  letter-spacing: 0.06em; min-width: 80px; padding-top: 2px; font-weight: 600;
}
.rail-meta .v {
  flex: 1; font-family: var(--font-mono); font-size: 11.5px; color: var(--ink-2);
  word-break: break-all; min-width: 0;
}
.rail-meta .v .pillrow { display: flex; flex-wrap: wrap; gap: 4px; font-family: var(--font-ui); }

.empty-rail { color: var(--ink-4); font-size: 11.5px; padding: 4px 0; line-height: 1.55; }

/* ---- mini graph -------------------------------------------- */
.minigraph {
  width: 100%; height: 220px;
  background: var(--bg-elev);
  border: 1px solid var(--line); border-radius: 8px;
  position: relative; overflow: hidden;
  margin-bottom: 6px;
}
.minigraph svg { width: 100%; height: 100%; display: block; }
.mg-edge { stroke: var(--line-strong); stroke-width: 1; opacity: 0.6; }
.mg-node-circle { cursor: pointer; transition: stroke-width var(--duration-fast); }
.mg-node-circle:hover { stroke-width: 3; }
.mg-node-label {
  fill: var(--ink-2); font-size: 9.5px;
  font-family: var(--font-ui);
  pointer-events: none;
  text-anchor: middle;
}

/* ---- command palette -------------------------------------- */
.palette-bg {
  position: fixed; inset: 0; z-index: 100;
  background: rgba(0,0,0,0.18); backdrop-filter: blur(2px);
  display: flex; align-items: flex-start; justify-content: center; padding-top: 14vh;
}
.palette {
  width: 600px; max-width: 90vw;
  background: var(--bg-elev); border-radius: 12px;
  box-shadow: var(--shadow-pop); overflow: hidden;
  display: flex; flex-direction: column; border: 1px solid var(--line);
}
.palette-input {
  display: flex; align-items: center; gap: 10px;
  padding: 14px 16px; border-bottom: 1px solid var(--divider);
  color: var(--ink-3);
}
.palette-input input { flex: 1; border: 0; outline: 0; background: none; font-size: 16px; color: var(--ink); font-family: var(--font-ui); }
.palette-results { max-height: 380px; overflow-y: auto; padding: 4px 0; }
.palette-empty { padding: 24px; text-align: center; color: var(--ink-4); font-size: 13px; }
.palette-row {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 16px; cursor: pointer; width: 100%; text-align: left;
}
.palette-row.on { background: var(--accent-tint); }
.palette-text { flex: 1; min-width: 0; }
.palette-title { font-size: 13.5px; font-weight: 600; color: var(--ink); }
.palette-row.on .palette-title { color: var(--accent); }
.palette-sub {
  font-size: 12px; color: var(--ink-3); line-height: 1.4;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.palette-id { font-family: var(--font-mono); font-size: 10.5px; color: var(--ink-4); flex-shrink: 0; }
.palette-foot {
  display: flex; gap: 14px; padding: 8px 16px;
  border-top: 1px solid var(--divider);
  font-size: 11px; color: var(--ink-4);
}

/* ---- error / loading states ------------------------------- */
.err {
  margin: 60px auto; max-width: 560px; padding: 18px 22px;
  background: color-mix(in oklch, var(--c-decision) 6%, var(--bg-elev));
  border: 1px solid color-mix(in oklch, var(--c-decision) 24%, var(--line));
  border-left: 3px solid var(--c-decision);
  border-radius: 8px;
  font-size: 13px; line-height: 1.6; color: var(--ink-2);
}
.err strong { color: var(--c-decision); }
.empty-reader {
  height: 100%;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  color: var(--ink-4); gap: 12px;
}
.empty-reader .glyph {
  width: 56px; height: 56px; border-radius: 14px;
  background: var(--bg-chip); display: flex; align-items: center; justify-content: center;
  color: var(--ink-3);
}

/* ========================================================================
   V3 chat2 refinements — sidebar command row, structured body, settings
   ======================================================================== */
:root {
  --radius-xs: 4px; --radius-sm: 6px; --radius-md: 8px;
  --radius-lg: 12px; --radius-xl: 16px;
}

/* ---- sidebar command row (⌘K launcher + settings gear) ---- */
.cmd-row { display: flex; align-items: center; gap: 4px; margin: 10px 12px 6px; }
.cmd-row .side-search { margin: 0; flex: 1; }
.gear-btn {
  width: 30px; height: 30px; min-width: 30px; padding: 0; flex-shrink: 0;
  border: 1px solid var(--line); background: var(--bg-elev); color: var(--ink-3);
}
.gear-btn:hover { border-color: var(--line-strong); color: var(--ink); background: var(--bg-elev); }
.gear-btn svg { width: 14px; height: 14px; }

/* ======================================================================
   STRUCTURED BODY — sections rendered by kind, not flat markdown.
   ====================================================================== */
.sx-doc { color: var(--ink); font-size: 14px; line-height: 1.6; }
.sx-doc > .sx { margin: 0; padding: 22px 0 24px; border-top: 1px solid var(--divider); }
.sx-doc > .sx:first-child { padding-top: 4px; border-top: 0; }
.sx-doc > .sx:last-child { padding-bottom: 0; }

.sx-h { display: flex; align-items: center; gap: 8px; margin: 0 0 12px; }
.sx-h-icon {
  display: inline-flex; align-items: center; justify-content: center;
  width: 22px; height: 22px; border-radius: 6px;
  background: var(--bg-chip); color: var(--ink-3); flex-shrink: 0;
}
.sx-h-title {
  font-family: var(--font-display);
  font-size: 13.5px; font-weight: 600;
  letter-spacing: 0.02em; text-transform: uppercase;
  color: var(--ink-2); margin: 0;
}
.sx-body { color: var(--ink-2); }
.sx-muted { color: var(--ink-4); font-size: 12px; }
.sx-prose { line-height: 1.7; color: var(--ink); font-size: 14px; }

/* info: key:value grid */
.sx-kv {
  margin: 0; padding: 0; display: grid;
  grid-template-columns: max-content 1fr;
  column-gap: 18px; row-gap: 6px; font-size: 13.5px;
}
.sx-kv .sx-kv-row { display: contents; }
.sx-kv dt { color: var(--ink-3); font-size: 12px; font-weight: 500; padding-top: 2px; white-space: nowrap; }
.sx-kv dd { color: var(--ink); margin: 0; }

/* timeline */
.sx-tl { list-style: none; margin: 0; padding: 0; }
.sx-tl-row { display: grid; grid-template-columns: 110px 1fr; column-gap: 18px; padding: 8px 0 10px; position: relative; }
.sx-tl-date { position: relative; padding-left: 16px; font-family: var(--font-mono); }
.sx-tl-dot {
  position: absolute; left: 0; top: 6px;
  width: 8px; height: 8px; border-radius: 50%; background: var(--accent);
  box-shadow: 0 0 0 3px var(--bg-elev), 0 0 0 4px color-mix(in srgb, var(--accent) 30%, transparent);
}
.sx-tl-row:not(:last-child) .sx-tl-date::before {
  content: ""; position: absolute; left: 3px; top: 14px; bottom: -10px;
  width: 2px; background: var(--divider);
}
.sx-tl-d1 { font-size: 12px; color: var(--ink-2); font-weight: 500; }
.sx-tl-d2 { font-size: 10.5px; color: var(--ink-4); margin-top: 2px; }
.sx-tl-text { font-size: 13.5px; color: var(--ink); line-height: 1.55; padding-top: 2px; }

/* stance */
.sx-stance-list { display: flex; flex-direction: column; gap: 6px; }
.sx-stance-row { display: flex; flex-direction: column; gap: 4px; padding: 8px 10px; border-radius: 7px; background: var(--bg-chip); }
.sx-stance-item { display: flex; align-items: flex-start; gap: 8px; font-size: 13px; line-height: 1.55; color: var(--ink); }
.sx-stance-lead { font-size: 12.5px; color: var(--ink-3); }
.sx-stance-text { flex: 1; min-width: 0; }
.sx-stance-chip {
  flex-shrink: 0; display: inline-flex; align-items: center; justify-content: center;
  height: 18px; padding: 0 7px;
  font-family: var(--font-mono); font-size: 10px; font-weight: 600;
  letter-spacing: 0.04em; border-radius: 4px; margin-top: 1px;
}
.sx-stance-chip.obs  { color: oklch(0.45 0.13 230); background: color-mix(in oklch, oklch(0.62 0.14 230) 16%, transparent); }
.sx-stance-chip.inf  { color: oklch(0.50 0.13 70);  background: color-mix(in oklch, oklch(0.72 0.14 70) 18%, transparent); }
.sx-stance-chip.fact { color: oklch(0.45 0.13 150); background: color-mix(in oklch, oklch(0.62 0.14 150) 16%, transparent); }
.sx-stance-chip.q    { color: oklch(0.45 0.16 305); background: color-mix(in oklch, oklch(0.62 0.16 305) 16%, transparent); }
[data-theme="dark"] .sx-stance-chip.obs  { color: oklch(0.85 0.10 230); background: color-mix(in oklch, oklch(0.62 0.14 230) 28%, transparent); }
[data-theme="dark"] .sx-stance-chip.inf  { color: oklch(0.85 0.10 70);  background: color-mix(in oklch, oklch(0.72 0.14 70) 28%, transparent); }
[data-theme="dark"] .sx-stance-chip.fact { color: oklch(0.85 0.10 150); background: color-mix(in oklch, oklch(0.62 0.14 150) 28%, transparent); }
[data-theme="dark"] .sx-stance-chip.q    { color: oklch(0.85 0.12 305); background: color-mix(in oklch, oklch(0.62 0.16 305) 28%, transparent); }
.sx-stance-grid { display: flex; flex-direction: column; gap: 10px; }
.sx-stance-party { border: 1px solid var(--divider); border-radius: 8px; padding: 10px 12px; background: var(--bg-elev); }
.sx-stance-party-h { margin-bottom: 6px; font-size: 13px; font-weight: 600; }
.sx-stance-party .sx-stance-list { gap: 5px; }
.sx-stance-party .sx-stance-item { background: transparent; padding: 0; }

/* todos */
.sx-todos { list-style: none; margin: 0; padding: 0; }
.sx-todo {
  display: grid; grid-template-columns: 18px 1fr auto auto;
  column-gap: 10px; align-items: center;
  padding: 8px 0; border-bottom: 1px solid var(--divider); font-size: 13.5px;
}
.sx-todo:last-child { border-bottom: 0; }
.sx-todo-box { width: 14px; height: 14px; border-radius: 4px; border: 1.5px solid var(--line-strong); display: inline-block; }
.sx-todo-task { color: var(--ink); }
.sx-todo-owner { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; color: var(--ink-3); }
.sx-todo-owner svg { color: var(--ink-4); }
.sx-todo-ddl {
  display: inline-flex; align-items: center; gap: 4px;
  font-family: var(--font-mono); font-size: 11px;
  padding: 2px 7px; border-radius: 4px; background: var(--bg-chip); color: var(--ink-2);
}
.sx-todo-ddl svg { opacity: 0.6; }
.sx-todo-rel { color: var(--ink-4); margin-left: 4px; }

/* node refs */
.sx-refs { display: flex; flex-direction: column; gap: 6px; }
.sx-refs-row { display: grid; grid-template-columns: 64px 1fr; column-gap: 14px; align-items: baseline; }
.sx-refs-label {
  font-size: 11.5px; font-weight: 600; letter-spacing: 0.04em;
  color: var(--ink-3); text-transform: uppercase; font-family: var(--font-mono);
}
.sx-refs-chips { display: flex; flex-wrap: wrap; gap: 5px 8px; }

/* numbered (agenda, goals, keypoints) */
.sx-numbered, .sx-goals, .sx-keypoints {
  list-style: none; margin: 0; padding: 0;
  display: flex; flex-direction: column; gap: 8px;
}
.sx-num {
  font-family: var(--font-mono); font-size: 11px; font-weight: 600;
  color: var(--ink-4); background: var(--bg-chip);
  padding: 2px 6px; border-radius: 4px; flex-shrink: 0;
  min-width: 22px; text-align: center;
}
.sx-numbered li, .sx-goal { display: flex; align-items: flex-start; gap: 10px; padding: 4px 0; font-size: 13.5px; color: var(--ink); }
.sx-num-text, .sx-goal-text { flex: 1; line-height: 1.55; padding-top: 1px; }
.sx-goals .sx-goal { padding: 8px 12px; background: var(--bg-chip); border-radius: 7px; }
.sx-goals .sx-num { color: var(--accent); background: var(--accent-tint); }

/* keypoints */
.sx-keypoint { display: flex; align-items: flex-start; gap: 10px; padding: 8px 0; font-size: 13.5px; }
.sx-keypoint + .sx-keypoint { border-top: 1px solid var(--divider); }
.sx-kp-body { flex: 1; min-width: 0; }
.sx-kp-lead { font-weight: 600; color: var(--ink); margin-bottom: 2px; }
.sx-kp-rest { color: var(--ink-2); line-height: 1.55; }

/* status pill */
.sx-status { display: flex; flex-wrap: wrap; gap: 8px; }
.sx-status-pill {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 6px 12px; border-radius: 6px; font-size: 12.5px; font-weight: 500;
  background: var(--bg-chip); color: var(--ink-2);
}
.sx-status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--ink-4); }
.sx-state-on    { color: oklch(0.45 0.13 150); background: color-mix(in oklch, oklch(0.62 0.14 150) 14%, transparent); }
.sx-state-on    .sx-status-dot { background: oklch(0.62 0.14 150); box-shadow: 0 0 0 3px color-mix(in oklch, oklch(0.62 0.14 150) 22%, transparent); }
.sx-state-stale { color: oklch(0.50 0.13 70);  background: color-mix(in oklch, oklch(0.72 0.14 70) 16%, transparent); }
.sx-state-stale .sx-status-dot { background: oklch(0.72 0.14 70); }
.sx-state-super { color: var(--ink-3); background: var(--bg-chip); }
.sx-state-draft { color: var(--ink-3); background: var(--bg-chip); }
[data-theme="dark"] .sx-state-on    { color: oklch(0.85 0.13 150); background: color-mix(in oklch, oklch(0.62 0.14 150) 26%, transparent); }
[data-theme="dark"] .sx-state-stale { color: oklch(0.85 0.13 70);  background: color-mix(in oklch, oklch(0.72 0.14 70) 28%, transparent); }

/* members */
.sx-members { display: flex; flex-direction: column; gap: 6px; }
.sx-member-row { display: grid; grid-template-columns: 64px 1fr; column-gap: 14px; align-items: center; }
.sx-member-role {
  font-size: 11.5px; font-weight: 600; color: var(--ink-3);
  font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 0.04em;
}
.sx-member-people { display: flex; flex-wrap: wrap; gap: 6px 8px; align-items: center; font-size: 13.5px; color: var(--ink); }

/* conclusions */
.sx-conclusions { display: flex; flex-direction: column; gap: 8px; }
.sx-conclusion {
  display: grid; grid-template-columns: 120px 1fr; column-gap: 16px; align-items: baseline;
  padding: 10px 12px; background: var(--bg-chip); border-radius: 7px;
  border-left: 3px solid var(--accent); font-size: 13.5px;
}
.sx-conclusion-lead { font-weight: 600; color: var(--ink); font-size: 12.5px; }
.sx-conclusion-text { color: var(--ink-2); line-height: 1.55; }

/* warnings */
.sx-warns { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 8px; }
.sx-warn {
  display: flex; align-items: flex-start; gap: 8px; padding: 8px 12px;
  background: color-mix(in oklch, oklch(0.72 0.14 70) 10%, transparent);
  border-left: 3px solid oklch(0.72 0.14 70);
  border-radius: 0 6px 6px 0; font-size: 13.5px; line-height: 1.55; color: var(--ink);
}
.sx-warn svg { color: oklch(0.62 0.14 70); flex-shrink: 0; margin-top: 2px; }

/* takeaways */
.sx-takeaways { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 6px; }
.sx-takeaway {
  display: flex; align-items: flex-start; gap: 10px; padding: 6px 10px;
  background: color-mix(in oklch, oklch(0.62 0.14 150) 8%, transparent);
  border-radius: 6px; font-size: 13.5px; line-height: 1.55; color: var(--ink);
}
.sx-take-mark { font-family: var(--font-mono); font-weight: 700; color: oklch(0.55 0.14 150); flex-shrink: 0; }
[data-theme="dark"] .sx-take-mark { color: oklch(0.78 0.14 150); }

/* risks */
.sx-risks { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 5px; }
.sx-risk { display: flex; align-items: flex-start; gap: 8px; padding: 5px 0; font-size: 13.5px; line-height: 1.55; color: var(--ink); }
.sx-risk-mark { color: oklch(0.62 0.16 25); font-family: var(--font-mono); font-weight: 700; flex-shrink: 0; }
[data-theme="dark"] .sx-risk-mark { color: oklch(0.75 0.16 25); }

/* generic bullets */
.sx-bullets { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 4px; }
.sx-bullets li { display: flex; align-items: flex-start; gap: 10px; padding: 3px 0; font-size: 13.5px; line-height: 1.6; color: var(--ink); }
.sx-bullet-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--ink-4); margin-top: 9px; flex-shrink: 0; }

@media (max-width: 640px) {
  .sx-refs-row, .sx-member-row, .sx-conclusion { grid-template-columns: 1fr; row-gap: 4px; }
  .sx-tl-row { grid-template-columns: 92px 1fr; column-gap: 12px; }
}

/* ======================================================================
   SETTINGS — reader width + density (data-attrs on <html>)
   ====================================================================== */
:root { --reader-w: 760px; --reader-px: 56px; --reader-py: 36px; }
html[data-width="narrow"]  { --reader-w: 600px; }
html[data-width="normal"]  { --reader-w: 760px; }
html[data-width="wide"]    { --reader-w: 980px; }
html[data-density="compact"]  { --reader-py: 20px; --reader-px: 40px; }
html[data-density="spacious"] { --reader-py: 48px; --reader-px: 64px; }

html[data-density="compact"] .sx-doc            { font-size: 13px; line-height: 1.5; }
html[data-density="compact"] .sx-doc > .sx      { padding: 12px 0 14px; }
html[data-density="compact"] .sx-h              { margin-bottom: 6px; gap: 6px; }
html[data-density="compact"] .sx-h-icon         { width: 18px; height: 18px; border-radius: 5px; }
html[data-density="compact"] .sx-h-title        { font-size: 12.5px; }
html[data-density="compact"] .sx-kv             { row-gap: 3px; font-size: 13px; }
html[data-density="compact"] .sx-kv dt          { padding-top: 1px; font-size: 11.5px; }
html[data-density="compact"] .sx-tl-row         { padding: 3px 0 5px; }
html[data-density="compact"] .sx-tl-text        { font-size: 13px; }
html[data-density="compact"] .sx-todo           { padding: 5px 0; font-size: 13px; }
html[data-density="compact"] .sx-bullets li     { padding: 1px 0; font-size: 13px; }
html[data-density="compact"] .sx-bullet-dot     { margin-top: 8px; }
html[data-density="compact"] .sx-stance-list    { gap: 3px; }
html[data-density="compact"] .sx-stance-row     { padding: 5px 8px; }
html[data-density="compact"] .sx-stance-item    { font-size: 12.5px; }
html[data-density="compact"] .sx-stance-grid    { gap: 6px; }
html[data-density="compact"] .sx-stance-party   { padding: 7px 10px; }
html[data-density="compact"] .sx-goals .sx-goal,
html[data-density="compact"] .sx-conclusion     { padding: 6px 10px; font-size: 13px; }
html[data-density="compact"] .sx-keypoint       { padding: 5px 0; font-size: 13px; }
html[data-density="compact"] .sx-refs           { gap: 4px; }
html[data-density="compact"] .sx-warn,
html[data-density="compact"] .sx-takeaway       { padding: 5px 10px; font-size: 13px; }
html[data-density="compact"] .sx-risk           { padding: 3px 0; font-size: 13px; }
html[data-density="spacious"] .sx-doc           { font-size: 14.5px; line-height: 1.72; }
html[data-density="spacious"] .sx-doc > .sx     { padding: 28px 0 30px; }
html[data-density="spacious"] .sx-h             { margin-bottom: 16px; }
html[data-density="spacious"] .sx-kv            { row-gap: 9px; }
html[data-density="spacious"] .sx-tl-row        { padding: 12px 0 14px; }
html[data-density="spacious"] .sx-todo          { padding: 12px 0; }

/* ======================================================================
   SETTINGS MODAL
   ====================================================================== */
.settings-bg {
  position: fixed; inset: 0; z-index: 110;
  background: rgba(0,0,0,0.32);
  backdrop-filter: blur(4px) saturate(140%);
  -webkit-backdrop-filter: blur(4px) saturate(140%);
  display: flex; align-items: center; justify-content: center;
  animation: settingsFade 160ms ease-out;
}
@keyframes settingsFade { from { opacity: 0; } to { opacity: 1; } }
.settings {
  width: 460px; max-width: 92vw;
  background: var(--bg-elev); border: 1px solid var(--line);
  border-radius: var(--radius-lg); box-shadow: var(--shadow-pop);
  overflow: hidden;
  animation: settingsRise 200ms cubic-bezier(0.2, 0.9, 0.3, 1.1);
}
@keyframes settingsRise {
  from { transform: translateY(8px) scale(0.985); opacity: 0; }
  to   { transform: translateY(0) scale(1); opacity: 1; }
}
.settings-h { display: flex; align-items: center; gap: 8px; padding: 14px 16px; border-bottom: 1px solid var(--divider); }
.settings-h svg { color: var(--ink-3); flex-shrink: 0; }
.settings-h-title {
  flex: 1; font-family: var(--font-display);
  font-size: 15px; font-weight: 600; letter-spacing: -0.005em; color: var(--ink);
}

</style>

<script src="vendor/markdown-it.min.js"></script>
<script>
'use strict';

/* ========================================================================
   byteworker viewer · production app
   Workspace (entity-graph) layout. Vanilla JS.
   ======================================================================== */

// ---- constants -------------------------------------------------
const DIR = {
  person: 'people', project: 'projects', area: 'areas', org: 'orgs',
  event: 'events', decision: 'decisions', reading: 'readings'
};
const KB = '../kb/';
const TYPE_ORDER = ['person','project','area','org','event','decision','reading'];
const TYPE_LABEL = {
  person:'人员', project:'项目', area:'主题领域', org:'组织',
  event:'事件', decision:'决策', reading:'读物'
};
const ID_RE = /\b(?:person|project|area|org|event|decision|reading)-[a-z0-9]+(?:-[a-z0-9]+)*\b/g;
const TODAY = new Date().toISOString().slice(0, 10);

const md = window.markdownit({ html: false, linkify: true, typographer: false });

// ---- state ----------------------------------------------------
const state = {
  // index data (loaded from INDEX.md)
  // each entry: { id, title, tldr, status, type, last_verified }
  nodes: [],
  byId: {},
  byType: {},

  // per-node full content & frontmatter cache; populated lazily + by scan
  nodeFull: {},          // id -> { fm, body, html, links: [] }
  inflight: {},          // id -> Promise (dedupe fetches)

  // links/backlinks indices, populated by background scan
  forwardLinks: {},      // id -> Set of ids (from frontmatter `links`)
  backlinks: {},         // id -> Set of ids
  scanDone: false,
  scanProgress: { done: 0, total: 0 },

  // navigation history
  history: [],           // entries: { kind: 'node'|'raw', id?, path?, label? }
  hIdx: -1,

  // ui
  openGroups: Object.fromEntries(TYPE_ORDER.map(t => [t, true])),
  expandedGroups: Object.fromEntries(TYPE_ORDER.map(t => [t, false])), // "+N more" toggled
  recentOpen: true,
  sideFilterQ: '',
  recentIds: [], // most-recently-opened, deduped, capped 8
  rail: 'graph',
  settings: { theme: 'light', density: 'normal', width: 'normal' },
  settingsOpen: false,
  paletteOpen: false,
  paletteQ: '',
  paletteSel: 0,
};

// load persisted display settings
try {
  const stored = JSON.parse(localStorage.getItem('bw.viewer.settings') || '{}');
  state.settings = Object.assign(state.settings, stored);
} catch (e) { /* defaults */ }

// apply theme / density / width as data-* attrs on <html>
function applySettings() {
  const h = document.documentElement;
  h.dataset.theme = state.settings.theme;
  h.dataset.density = state.settings.density;
  h.dataset.width = state.settings.width;
}
applySettings();

// ---- dom refs ------------------------------------------------
const $ = (id) => document.getElementById(id);
const D = {
  brandSub: $('brand-sub'),
  btnBack: $('btn-back'),
  btnFwd: $('btn-fwd'),
  btnSearch: $('btn-search'),
  btnSettings: $('btn-settings'),
  btnCopy: $('btn-copy'),
  scIndex: $('sc-index'),
  scDash: $('sc-dash'),
  sideScroll: $('side-scroll'),
  sideFilter: $('side-filter'),
  sideFilterWrap: $('side-filter-wrap'),
  sideFilterClear: $('side-filter-clear'),
  scanDot: $('scan-dot'),
  scanStatus: $('scan-status'),
  crumbs: $('crumbs'),
  readerBody: $('reader-body'),
  railScroll: $('rail-scroll'),
  railGraphCount: $('rail-graph-count'),
  palettePortal: $('palette-portal'),
  settingsPortal: $('settings-portal'),
};

// ---- utilities -----------------------------------------------
function esc(s) {
  return String(s ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
}

function nodeDir(id) {
  const pfx = id.split('-')[0];
  return DIR[pfx] || null;
}

function relTime(date) {
  if (!date) return '—';
  const d = Math.floor((Date.parse(TODAY) - Date.parse(date)) / 86400000);
  if (isNaN(d)) return '—';
  if (d <= 0) return '今天';
  if (d === 1) return '昨天';
  if (d < 7) return `${d} 天前`;
  if (d < 30) return `${Math.floor(d / 7)} 周前`;
  if (d < 365) return `${Math.floor(d / 30)} 个月前`;
  return `${Math.floor(d / 365)} 年前`;
}

function isStale(n) {
  if (!n) return false;
  if (n.status === 'stale') return true;
  if (n.status === 'current' && n.last_verified) {
    const d = Math.floor((Date.parse(TODAY) - Date.parse(n.last_verified)) / 86400000);
    if (d > 90) return true;
  }
  return false;
}

// ---- INDEX.md parsing (from original viewer) -----------------
function parseIndex(text) {
  const out = [];
  let cur = null;
  for (const raw of text.split('\n')) {
    const h = raw.match(/^##\s+.*\(([a-z]+)\)\s*$/);
    if (h && DIR[h[1]]) { cur = h[1]; continue; }
    if (raw.startsWith('## ')) { cur = null; continue; }
    if (!cur) continue;
    const m = raw.match(/^\|(.+)\|$/);
    if (!m) continue;
    const c = m[1].split('|').map(s => s.trim());
    if (c[0] === 'id' || /^-+$/.test(c[0])) continue;
    if (!c[0]) continue;
    out.push({
      id: c[0],
      title: c[1] || c[0],
      tldr: c[2] || '',
      status: c[3] || 'current',
      last_verified: c[4] || '',
      type: cur,
    });
  }
  return out;
}

// ---- YAML-ish frontmatter parser (from original) ------------
function parseFM(text) {
  const m = text.match(/^---\r?\n([\s\S]*?)\r?\n---\r?\n?([\s\S]*)$/);
  if (!m) return { fm: {}, body: text };
  const fm = {};
  const L = m[1].split('\n');
  for (let i = 0; i < L.length; i++) {
    const km = L[i].match(/^([A-Za-z_]+):\s*(.*)$/);
    if (!km) continue;
    const k = km[1];
    let v = km[2].trim();
    if (v === '') {
      const a = [];
      while (i + 1 < L.length && /^\s*-\s+/.test(L[i + 1])) {
        a.push(L[++i].replace(/^\s*-\s+/, '').trim());
      }
      fm[k] = a.length ? a : '';
    } else if (v.startsWith('[')) {
      fm[k] = v.replace(/^\[|\]$/g, '').split(',').map(s => s.trim()).filter(Boolean);
    } else {
      fm[k] = v;
    }
  }
  return { fm, body: m[2] };
}

// ---- node body fetch with cache ------------------------------
async function fetchNode(id) {
  if (state.nodeFull[id]) return state.nodeFull[id];
  if (state.inflight[id]) return state.inflight[id];
  const dir = nodeDir(id);
  if (!dir) throw new Error('未知 id: ' + id);
  state.inflight[id] = (async () => {
    const r = await fetch(KB + 'knowledge/' + dir + '/' + id + '.md');
    if (!r.ok) throw new Error('找不到: knowledge/' + dir + '/' + id + '.md');
    const text = await r.text();
    const { fm, body } = parseFM(text);
    const links = Array.isArray(fm.links) ? fm.links.filter(Boolean) : [];
    const html = md.render(body);
    state.nodeFull[id] = { fm, body, html, links };
    // update index entry with fresh frontmatter (status etc may have changed)
    const e = state.byId[id];
    if (e) {
      if (fm.status) e.status = fm.status;
      if (fm.last_verified) e.last_verified = fm.last_verified;
      if (fm.updated) e.updated = fm.updated;
      if (fm.tldr) e.tldr = e.tldr || fm.tldr;
    }
    delete state.inflight[id];
    return state.nodeFull[id];
  })();
  return state.inflight[id];
}

// ---- background scan to build links/backlinks index --------
async function scanAll() {
  state.scanProgress.total = state.nodes.length;
  state.scanProgress.done = 0;
  updateScanStatus();
  // fetch with concurrency cap
  const CONCURRENCY = 6;
  const queue = state.nodes.slice();
  const workers = [];
  for (let w = 0; w < CONCURRENCY; w++) {
    workers.push((async () => {
      while (queue.length) {
        const n = queue.shift();
        try { await fetchNode(n.id); }
        catch (e) { /* missing files are tolerated */ }
        state.scanProgress.done++;
        if (state.scanProgress.done % 3 === 0 || state.scanProgress.done === state.scanProgress.total) {
          updateScanStatus();
        }
      }
    })());
  }
  await Promise.all(workers);
  // build forward/backlinks from cache
  state.forwardLinks = {};
  state.backlinks = {};
  for (const n of state.nodes) state.backlinks[n.id] = new Set();
  for (const n of state.nodes) {
    const full = state.nodeFull[n.id];
    if (!full) continue;
    const fwd = new Set();
    for (const l of full.links) {
      if (state.byId[l]) {
        fwd.add(l);
        state.backlinks[l].add(n.id);
      }
    }
    state.forwardLinks[n.id] = fwd;
  }
  state.scanDone = true;
  updateScanStatus();
  // re-render rail if currently viewing a node
  const cur = currentEntry();
  if (cur?.kind === 'node') renderRail(cur.id);
}

function updateScanStatus() {
  const { done, total } = state.scanProgress;
  if (state.scanDone) {
    D.scanDot.classList.add('ready');
    D.scanStatus.textContent = `${state.nodes.length} 个节点 · 索引就绪`;
  } else {
    D.scanDot.classList.remove('ready');
    D.scanStatus.textContent = `扫描中 ${done}/${total}`;
  }
}

// ---- navigation history -------------------------------------
function currentEntry() { return state.hIdx >= 0 ? state.history[state.hIdx] : null; }

function navOpen(entry) {
  // truncate forward and push
  state.history = state.history.slice(0, state.hIdx + 1);
  const last = state.history[state.history.length - 1];
  // dedupe consecutive same-target
  if (last && last.kind === entry.kind && last.id === entry.id && last.path === entry.path) {
    state.hIdx = state.history.length - 1;
  } else {
    state.history.push(entry);
    state.hIdx = state.history.length - 1;
  }
  // track recents (node entries only)
  if (entry.kind === 'node') {
    state.recentIds = [entry.id, ...state.recentIds.filter(i => i !== entry.id)].slice(0, 8);
    renderSidebar();
  }
  updateNavButtons();
  renderCurrent();
}

function navBack() {
  if (state.hIdx > 0) { state.hIdx--; updateNavButtons(); renderCurrent(); }
}
function navFwd() {
  if (state.hIdx < state.history.length - 1) { state.hIdx++; updateNavButtons(); renderCurrent(); }
}
function navJump(i) {
  if (i >= 0 && i < state.history.length) { state.hIdx = i; updateNavButtons(); renderCurrent(); }
}

function updateNavButtons() {
  D.btnBack.disabled = state.hIdx <= 0;
  D.btnFwd.disabled = state.hIdx >= state.history.length - 1;
}

function renderCurrent() {
  const e = currentEntry();
  if (!e) {
    D.crumbs.innerHTML = '';
    D.railScroll.innerHTML = '<div class="empty-rail">未选中节点。</div>';
    return;
  }
  renderCrumbs();
  if (e.kind === 'node') {
    renderReaderNode(e.id);
    renderRail(e.id);
    highlightSidebar(e.id);
  } else {
    renderReaderRaw(e.path, e.label);
    D.railScroll.innerHTML = '<div class="empty-rail">' + esc(e.label) + ' · 文档视图,无图谱上下文。</div>';
    D.railGraphCount.textContent = '—';
    highlightSidebar(null);
    if (e.label === '主索引 INDEX') D.scIndex.classList.add('on');
    else D.scIndex.classList.remove('on');
    if (e.label === '工作看板') D.scDash.classList.add('on');
    else D.scDash.classList.remove('on');
  }
}

// ---- sidebar render ---------------------------------------
const SIDEBAR_TYPE_DEFAULT_CAP = 15; // truncate long types until expanded

function sortByRecency(rows) {
  return rows.slice().sort((a, b) => {
    const av = a.last_verified || a.updated || a.created || '';
    const bv = b.last_verified || b.updated || b.created || '';
    return bv.localeCompare(av);
  });
}

function matchesFilter(n, q) {
  if (!q) return true;
  return (n.id + ' ' + (n.title || '') + ' ' + (n.tldr || '')).toLowerCase().includes(q);
}

function renderSidebar() {
  const q = state.sideFilterQ.trim().toLowerCase();
  D.sideFilterWrap.classList.toggle('has-q', q.length > 0);

  // "Recently viewed" group (only when not filtering, and ≥2 recents)
  let recentHTML = '';
  if (!q && state.recentIds.length >= 2) {
    const items = state.recentIds.map(id => {
      const n = state.byId[id];
      if (!n) return '';
      return `<button class="entity-row" data-id="${esc(n.id)}" title="${esc(n.tldr)}">
        <span class="tdot ${n.type}" style="margin-right:2px"></span>
        <span class="title">${esc(n.title)}</span>
      </button>`;
    }).join('');
    recentHTML = `<div class="type-group pinned ${state.recentOpen ? 'open' : ''}">
      <button class="type-group-h" data-toggle-recent>
        <span class="chev">▸</span>
        <svg width="11" height="11" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="7" cy="7" r="5"/><path d="M7 4v3l2 1"/></svg>
        <span class="label">最近</span>
        <span class="count">${state.recentIds.length}</span>
      </button>
      <div class="type-group-body">${items}</div>
    </div>`;
  }

  // Type groups
  const groupsHTML = TYPE_ORDER.map(t => {
    const allRows = state.byType[t] || [];
    if (!allRows.length) return '';
    const filtered = q ? allRows.filter(n => matchesFilter(n, q)) : allRows;
    if (q && !filtered.length) return ''; // hide group with no matches while filtering
    // when filtering, force-open and skip cap (filtered results are small enough)
    const open = q ? true : state.openGroups[t];
    const expanded = state.expandedGroups[t];
    const sorted = sortByRecency(filtered);
    const cap = q ? sorted.length : (expanded ? sorted.length : SIDEBAR_TYPE_DEFAULT_CAP);
    const shown = sorted.slice(0, cap);
    const hidden = sorted.length - shown.length;

    const items = shown.map(n => {
      const stale = isStale(n);
      const ssed = n.status === 'superseded';
      let badge = '';
      if (stale) badge = '<span class="badge">陈旧</span>';
      else if (ssed) badge = '<span class="badge">取代</span>';
      return `<button class="entity-row${stale ? ' stale' : ''}" data-id="${esc(n.id)}" title="${esc(n.tldr)}">
        <span class="title">${esc(n.title)}</span>${badge}
      </button>`;
    }).join('');

    let moreBtn = '';
    if (hidden > 0) {
      moreBtn = `<button class="type-group-more" data-expand="${t}">+ ${hidden} 更多…</button>`;
    } else if (expanded && sorted.length > SIDEBAR_TYPE_DEFAULT_CAP) {
      moreBtn = `<button class="type-group-more" data-expand="${t}">收起</button>`;
    }

    const total = allRows.length;
    const countStr = q ? `${filtered.length}/${total}` : `${total}`;

    return `<div class="type-group ${open ? 'open' : ''}" data-type="${t}">
      <button class="type-group-h" data-toggle="${t}">
        <span class="chev">▸</span>
        <span class="tdot ${t}"></span>
        <span class="label">${TYPE_LABEL[t]}</span>
        <span class="count">${countStr}</span>
      </button>
      <div class="type-group-body">${items}${moreBtn}</div>
    </div>`;
  }).join('');

  let emptyHTML = '';
  if (q && !groupsHTML) {
    emptyHTML = `<div style="padding: 24px 16px; text-align: center; color: var(--ink-4); font-size: 12px; line-height: 1.6;">
      未找到匹配 <span style="font-family:var(--font-mono);color:var(--ink-3)">"${esc(q)}"</span> 的节点。<br>
      试试 <span class="kbd">⌘K</span> 全库搜索。
    </div>`;
  }

  D.sideScroll.innerHTML = recentHTML + groupsHTML + emptyHTML;

  // wire events
  D.sideScroll.querySelectorAll('[data-toggle]').forEach(el => {
    el.addEventListener('click', () => {
      const t = el.dataset.toggle;
      state.openGroups[t] = !state.openGroups[t];
      el.parentElement.classList.toggle('open', state.openGroups[t]);
    });
  });
  const recHead = D.sideScroll.querySelector('[data-toggle-recent]');
  if (recHead) {
    recHead.addEventListener('click', () => {
      state.recentOpen = !state.recentOpen;
      recHead.parentElement.classList.toggle('open', state.recentOpen);
    });
  }
  D.sideScroll.querySelectorAll('[data-expand]').forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      const t = el.dataset.expand;
      state.expandedGroups[t] = !state.expandedGroups[t];
      renderSidebar();
    });
  });
  D.sideScroll.querySelectorAll('.entity-row').forEach(el => {
    el.addEventListener('click', () => navOpen({ kind: 'node', id: el.dataset.id }));
  });
  // restore highlight
  const cur = currentEntry();
  if (cur?.kind === 'node') highlightSidebar(cur.id);
}

function highlightSidebar(id) {
  D.sideScroll.querySelectorAll('.entity-row').forEach(el => {
    el.classList.toggle('on', el.dataset.id === id);
  });
}

// ---- crumbs render ----------------------------------------
function renderCrumbs() {
  const start = Math.max(0, state.hIdx - 2);
  const trail = state.history.slice(start, state.hIdx + 1);
  const html = trail.map((e, i) => {
    const real = start + i;
    const on = real === state.hIdx;
    let label, dot = '';
    if (e.kind === 'node') {
      const n = state.byId[e.id];
      label = n ? n.title : e.id;
      dot = n ? `<span class="tdot ${n.type}"></span>` : '';
    } else {
      label = e.label;
    }
    return (i > 0 ? '<span class="crumb-sep">/</span>' : '') +
      `<button class="crumb${on ? ' on' : ''}" data-i="${real}" title="${esc(label)}">
        ${dot}<span>${esc(label)}</span>
      </button>`;
  }).join('');
  D.crumbs.innerHTML = html;
  D.crumbs.querySelectorAll('[data-i]').forEach(el => {
    el.addEventListener('click', () => navJump(+el.dataset.i));
  });
}

async function renderReaderNode(id) {
  const n = state.byId[id];
  if (!n) {
    D.readerBody.innerHTML = `<div class="err"><strong>找不到节点。</strong><br>id: ${esc(id)}</div>`;

  }
  // show skeleton while loading
  D.readerBody.innerHTML = `<div class="reader-inner">

      <span class="id">${esc(n.id)}</span>
    </div>
    <h1 class="reader-title">${esc(n.title)}</h1>
    <div style="color:var(--ink-4);font-size:13px">加载中…</div>
  </div>`;
  let full;
  try { full = await fetchNode(id); }
  catch (e) {
    D.readerBody.innerHTML = `<div class="err"><strong>读取失败。</strong><br>${esc(e.message)}</div>`;
    return;
  }
  const fm = full.fm || {};
  const status = fm.status || n.status || 'current';
  const effectiveStatus = isStale({ status, last_verified: fm.last_verified || n.last_verified }) ? 'stale' : status;
  const statusLabel = { current: '现行', stale: '陈旧', superseded: '已取代' }[effectiveStatus] || effectiveStatus;
  const tags = Array.isArray(fm.tags) ? fm.tags : [];
  const html = `<div class="reader-inner">
    <div class="reader-eyebrow">
      <span class="tchip ${n.type}">${TYPE_LABEL[n.type]}</span>
      <span class="status ${effectiveStatus}">${statusLabel}</span>
      <span class="id">${esc(n.id)}</span>
      ${(fm.last_verified || n.last_verified) ? `<span style="color:var(--ink-4)">·</span><span>核实于 ${esc(fm.last_verified || n.last_verified)} (${relTime(fm.last_verified || n.last_verified)})</span>` : ''}
    </div>
    <h1 class="reader-title">${esc(n.title)}</h1>
    ${n.tldr ? `<div class="reader-tldr"><strong>TL;DR</strong>${esc(n.tldr)}</div>` : ''}
    ${tags.length ? `<div style="margin: -10px 0 24px; display: flex; flex-wrap: wrap; gap: 4px;">${tags.map(t => `<span class="tag">#${esc(t)}</span>`).join('')}</div>` : ''}

      navOpen({ kind: 'node', id: a.dataset.id });
    });
  });
  D.readerBody.scrollTop = 0;
}

// ---- linkify body ids (turn raw ids into clickable nodelinks) ----
function linkifyIds(root) {
  if (!root) return;
  const walk = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, null);
  const todo = [];
  for (let n; (n = walk.nextNode());) {
    if (n.parentElement.closest('a, code, pre')) continue;
    if (ID_RE.test(n.nodeValue)) { ID_RE.lastIndex = 0; todo.push(n); }
  }
  for (const node of todo) {
    const text = node.nodeValue;
    const frag = document.createDocumentFragment();
    let last = 0, mm;
    ID_RE.lastIndex = 0;
    while ((mm = ID_RE.exec(text)) !== null) {
      if (mm.index > last) frag.appendChild(document.createTextNode(text.slice(last, mm.index)));
      const id = mm[0];
      const target = state.byId[id];
      if (target) {
        const a = document.createElement('a');
        a.className = 'nodelink';
        a.href = '#' + id;
        a.innerHTML = `<span class="tdot ${target.type}"></span><span>${esc(target.title)}</span>`;
        a.addEventListener('click', (e) => {
          e.preventDefault();
          navOpen({ kind: 'node', id });
        });
        frag.appendChild(a);
      } else {
        const span = document.createElement('span');
        span.className = 'nodelink broken';
        span.textContent = id;
        frag.appendChild(span);
      }
      last = mm.index + id.length;
    }
    if (last < text.length) frag.appendChild(document.createTextNode(text.slice(last)));
    node.parentNode.replaceChild(frag, node);
  }
  // also replace [[id]] wiki-style if any
  root.querySelectorAll('a[href]').forEach(a => {
    // markdown-it linkify-style: skip
  });
}

// ---- reader render (raw md doc: INDEX, dashboard) ----------
async function renderReaderRaw(path, label) {
  D.readerBody.innerHTML = `<div class="reader-inner"><div style="color:var(--ink-4);font-size:13px">加载中…</div></div>`;
  try {
    const r = await fetch(path);
    if (!r.ok) throw new Error('找不到: ' + path);
    const text = await r.text();
    const html = md.render(text);
    D.readerBody.innerHTML = `<div class="reader-inner">
      <div class="reader-eyebrow">
        <span class="tchip" style="background: var(--bg-chip); color: var(--ink-3);">${esc(label)}</span>
        <span class="id">${esc(path)}</span>
      </div>
      <div class="prose" id="prose-content">${html}</div>
    </div>`;
    linkifyIds(document.getElementById('prose-content'));
    D.readerBody.scrollTop = 0;
  } catch (e) {
    D.readerBody.innerHTML = `<div class="err"><strong>读取失败。</strong><br>${esc(e.message)}</div>`;
  }
}

// ---- rail render -----------------------------------------
function renderRail(id) {
  const tab = state.rail;
  document.querySelectorAll('.rail-tab').forEach(el => {
    el.classList.toggle('on', el.dataset.rail === tab);
  });
  if (tab === 'graph') renderRailGraph(id);
  else if (tab === 'meta') renderRailMeta(id);
  else renderRailSource(id);
}

function renderRailGraph(id) {
  const n = state.byId[id];
  if (!n) { D.railScroll.innerHTML = '<div class="empty-rail">未选中节点。</div>'; return; }
  const full = state.nodeFull[id];
  // forward = from frontmatter `links`; if not loaded yet, use scan-derived (also from links)
  const fwd = full ? full.links.filter(l => state.byId[l]) : Array.from(state.forwardLinks[id] || []);
  const back = Array.from(state.backlinks[id] || []);
  const totalEdges = fwd.length + back.length;
  D.railGraphCount.textContent = state.scanDone ? totalEdges : '—';

  // group by type
  const groupBy = (ids) => {
    const o = {};
    for (const i of ids) {
      const t = state.byId[i]?.type;
      if (!t) continue;
      (o[t] = o[t] || []).push(i);
    }
    return o;
  };
  const fwdByType = groupBy(fwd);
  const backByType = groupBy(back);

  // related by tag (excluding own neighbors)
  let tagRelated = [];
  if (full && Array.isArray(full.fm.tags) && full.fm.tags.length && state.scanDone) {
    const own = new Set([id, ...fwd, ...back]);
    const tagSet = new Set(full.fm.tags);
    tagRelated = state.nodes.filter(x => {
      if (own.has(x.id)) return false;
      const xf = state.nodeFull[x.id];
      if (!xf || !Array.isArray(xf.fm.tags)) return false;
      return xf.fm.tags.some(t => tagSet.has(t));
    }).slice(0, 5).map(x => x.id);
  }

  const cardRow = (i) => {
    const x = state.byId[i];
    if (!x) return '';
    const stale = isStale(x);
    const statusLabel = stale ? 'stale' : (x.status || 'current');
    return `<button class="rail-card" data-id="${esc(i)}">
      <div class="rail-card-top">
        <span class="tdot ${x.type}"></span>
        <span class="rail-card-title">${esc(x.title)}</span>
        ${stale ? '<span class="status stale">陈旧</span>' : ''}
        ${x.status === 'superseded' ? '<span class="status superseded">已取代</span>' : ''}
      </div>
      <div class="rail-card-tldr">${esc(x.tldr || '')}</div>
    </button>`;
  };

  const groupHTML = (byT) => TYPE_ORDER.filter(t => byT[t]).map(t => `
    <div style="margin-bottom:10px">
      <div class="rail-subh"><span class="tdot ${t}"></span>${TYPE_LABEL[t]} · ${byT[t].length}</div>
      <div class="rail-group">${byT[t].map(cardRow).join('')}</div>
    </div>
  `).join('');

  const graphSVG = buildMiniGraph(n, fwd, back);

  let html = `<div class="rail-h">局部图谱 <span class="count">${Math.min(totalEdges, 10)} 跳</span></div>${graphSVG}`;

  if (fwd.length) {
    html += `<div class="rail-h">
      <span style="display:flex;align-items:center;gap:4px">引向 (forward)</span>
      <span class="count">${fwd.length}</span>
    </div>${groupHTML(fwdByType)}`;
  }

  if (state.scanDone) {
    if (back.length) {
      html += `<div class="rail-h">
        <span style="display:flex;align-items:center;gap:4px">提及 (backlink)</span>
        <span class="count">${back.length}</span>
      </div>${groupHTML(backByType)}`;
    } else {
      html += `<div class="rail-h">提及 (backlink)</div>
        <div class="empty-rail">暂无其他节点提及。</div>`;
    }
    if (tagRelated.length) {
      html += `<div class="rail-h">同 tag 相关 <span class="count">${tagRelated.length}</span></div>
        <div class="rail-group">${tagRelated.map(cardRow).join('')}</div>`;
    }
  } else {
    html += `<div class="rail-h">提及 (backlink)</div>
      <div class="empty-rail">索引扫描中 (${state.scanProgress.done}/${state.scanProgress.total})…</div>`;
  }

  D.railScroll.innerHTML = html;
  D.railScroll.querySelectorAll('[data-id]').forEach(el => {
    el.addEventListener('click', () => navOpen({ kind: 'node', id: el.dataset.id }));
  });
}

function buildMiniGraph(node, fwd, back) {
  const W = 280, H = 220, cx = W / 2, cy = H / 2;
  const seen = new Set();
  const neighbors = [];
  for (const id of [...fwd, ...back]) {
    if (!seen.has(id) && state.byId[id]) {
      seen.add(id);
      neighbors.push(state.byId[id]);
    }
  }
  const N = Math.min(neighbors.length, 10);
  const r = 76;
  let svg = `<svg viewBox="0 0 ${W} ${H}">`;
  // edges
  for (let i = 0; i < N; i++) {
    const angle = (i / N) * Math.PI * 2 - Math.PI / 2;
    const x = cx + Math.cos(angle) * r;
    const y = cy + Math.sin(angle) * r;
    svg += `<line class="mg-edge" x1="${cx}" y1="${cy}" x2="${x}" y2="${y}"/>`;
  }
  // center
  svg += `<circle class="mg-node-circle" cx="${cx}" cy="${cy}" r="14"
    fill="var(--c-${node.type})" stroke="var(--bg-elev)" stroke-width="3"/>`;
  const ttl = (node.title || '').length > 8 ? node.title.slice(0, 8) + '…' : node.title;
  svg += `<text class="mg-node-label" x="${cx}" y="${cy + 28}" font-weight="600">${esc(ttl)}</text>`;
  // neighbors
  for (let i = 0; i < N; i++) {
    const nb = neighbors[i];
    const angle = (i / N) * Math.PI * 2 - Math.PI / 2;
    const x = cx + Math.cos(angle) * r;
    const y = cy + Math.sin(angle) * r;
    const labelOffset = y < cy ? -10 : 14;
    const t = (nb.title || '').length > 6 ? nb.title.slice(0, 6) + '…' : nb.title;
    svg += `<g class="mg-node-group" data-id="${esc(nb.id)}" style="cursor:pointer">
      <circle class="mg-node-circle" cx="${x}" cy="${y}" r="7"
        fill="var(--c-${nb.type})" stroke="var(--bg-elev)" stroke-width="2"/>
      <text class="mg-node-label" x="${x}" y="${y + labelOffset}">${esc(t)}</text>
    </g>`;
  }
  svg += `</svg>`;
  // wire click handlers after insertion
  setTimeout(() => {
    document.querySelectorAll('.mg-node-group').forEach(el => {
      el.addEventListener('click', () => navOpen({ kind: 'node', id: el.dataset.id }));
    });
  }, 0);
  return `<div class="minigraph">${svg}</div>`;
}

function renderRailMeta(id) {
  const n = state.byId[id];
  if (!n) { D.railScroll.innerHTML = '<div class="empty-rail">未选中节点。</div>'; return; }
  const full = state.nodeFull[id];
  const fm = full?.fm || {};
  const stale = isStale(n);
  const tags = Array.isArray(fm.tags) ? fm.tags : [];
  const sources = Array.isArray(fm.sources) ? fm.sources : (fm.sources ? [fm.sources] : []);
  const linksCount = full?.links.length || 0;
  const rows = [];
  rows.push(['id', `<span style="font-family:var(--font-mono)">${esc(n.id)}</span>`]);
  rows.push(['type', `<span class="tchip ${n.type}">${TYPE_LABEL[n.type]}</span>`]);
  rows.push(['status', stale ? `<span class="status stale">陈旧</span>` :
    `<span class="status ${n.status || 'current'}">${({current:'现行',stale:'陈旧',superseded:'已取代'})[n.status || 'current']}</span>`]);
  if (fm.created) rows.push(['created', `<span style="font-family:var(--font-mono)">${esc(fm.created)}</span>`]);
  if (fm.updated) rows.push(['updated', `<span style="font-family:var(--font-mono)">${esc(fm.updated)}</span>`]);
  if (fm.last_verified || n.last_verified) {
    const lv = fm.last_verified || n.last_verified;
    rows.push(['last_verified', `<span style="font-family:var(--font-mono)">${esc(lv)}</span> <span style="color:var(--ink-4);font-family:var(--font-ui)">(${relTime(lv)})</span>`]);
  }
  if (fm.superseded_by) rows.push(['superseded_by', `<span style="font-family:var(--font-mono)">${esc(fm.superseded_by)}</span>`]);
  if (tags.length) rows.push(['tags', `<div class="pillrow">${tags.map(t => `<span class="tag">#${esc(t)}</span>`).join('')}</div>`]);
  if (sources.length) rows.push(['sources', sources.map(s => `<div>${esc(s)}</div>`).join('')]);
  rows.push(['links', `${linksCount} 条 forward`]);
  if (state.scanDone) {
    const back = state.backlinks[id]?.size || 0;
    rows.push(['backlinks', `${back} 条`]);
  }
  D.railScroll.innerHTML = `<div class="rail-h">frontmatter</div>
    <div class="rail-meta">${rows.map(([k, v]) => `<div class="row"><div class="k">${esc(k)}</div><div class="v">${v}</div></div>`).join('')}</div>`;
}

function renderRailSource(id) {
  const n = state.byId[id];
  if (!n) { D.railScroll.innerHTML = '<div class="empty-rail">未选中节点。</div>'; return; }
  const full = state.nodeFull[id];
  const sources = Array.isArray(full?.fm.sources) ? full.fm.sources : (full?.fm.sources ? [full.fm.sources] : []);
  let html = `<div class="rail-h">原始来源</div>`;
  if (sources.length) {
    html += sources.map(s => {
      const isRaw = /^raw-\d{4}-\d{2}-\d{2}/.test(s);
      return `<div class="rail-card" style="cursor:default;margin-bottom:6px">
        <div class="rail-card-top">
          <svg width="12" height="12" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h4a2 2 0 0 1 2 2v8a1.5 1.5 0 0 0-1.5-1.5H2V3zM12 3H8a2 2 0 0 0-2 2v8a1.5 1.5 0 0 1 1.5-1.5H12V3z"/></svg>
          <span class="rail-card-title" style="font-family:var(--font-mono);font-size:11.5px">${esc(s)}</span>
        </div>
        <div class="rail-card-tldr">${isRaw ? '逐字原文存于 raw_data/' + esc(s.replace(/^raw-/, '')) + '.md(viewer 只读,无法直读 raw_data)。' : '飞书原链接或外部 URL。'}</div>
      </div>`;
    }).join('');
  } else {
    html += `<div class="empty-rail">此节点未登记 sources。所有节点应至少 1 条 sources(raw_id 或飞书原链接);任何答案都能回原文核对。</div>`;
  }
  D.railScroll.innerHTML = html;
}

// ---- command palette -------------------------------------
function openPalette() {
  state.paletteOpen = true;
  state.paletteQ = '';
  state.paletteSel = 0;
  renderPalette();
  setTimeout(() => document.getElementById('palette-input')?.focus(), 30);
}
function closePalette() {
  state.paletteOpen = false;
  D.palettePortal.innerHTML = '';
}

function paletteResults() {
  const q = state.paletteQ.trim().toLowerCase();
  if (!q) return state.nodes.slice(0, 12);
  return state.nodes.filter(n =>
    (n.id + ' ' + n.title + ' ' + (n.tldr || '')).toLowerCase().includes(q)
  ).slice(0, 30);
}

function renderPalette() {
  if (!state.paletteOpen) { D.palettePortal.innerHTML = ''; return; }
  const results = paletteResults();
  state.paletteSel = Math.min(state.paletteSel, Math.max(0, results.length - 1));
  const html = `<div class="palette-bg" id="palette-bg">
    <div class="palette" id="palette-box">
      <div class="palette-input">
        <svg width="16" height="16" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="6.5" cy="6.5" r="4.5"/><path d="m10 10 3 3"/></svg>
        <input id="palette-input" value="${esc(state.paletteQ)}" placeholder="搜索 标题 / TL;DR / id / tag …" autocomplete="off"/>
        <span class="kbd">ESC</span>
      </div>
      <div class="palette-results">
        ${results.length === 0 ? '<div class="palette-empty">无结果</div>' :
          results.map((n, i) => `
            <button class="palette-row${i === state.paletteSel ? ' on' : ''}" data-i="${i}">
              <span class="tdot ${n.type}"></span>
              <div class="palette-text">
                <div class="palette-title">${esc(n.title)}</div>
                <div class="palette-sub">${esc(n.tldr || '')}</div>
              </div>
              <span class="palette-id">${esc(n.id)}</span>
            </button>
          `).join('')}
      </div>
      <div class="palette-foot">
        <span><span class="kbd">↑</span><span class="kbd">↓</span> 选择</span>
        <span><span class="kbd">↵</span> 打开</span>
        <span><span class="kbd">ESC</span> 关闭</span>
      </div>
    </div>
  </div>`;
  D.palettePortal.innerHTML = html;

  const bg = document.getElementById('palette-bg');
  const input = document.getElementById('palette-input');
  bg.addEventListener('mousedown', (e) => {
    if (e.target === bg) closePalette();
  });
  input.addEventListener('input', (e) => {
    state.paletteQ = e.target.value;
    state.paletteSel = 0;
    renderPalette();
    document.getElementById('palette-input')?.focus();
  });
  input.addEventListener('keydown', (e) => {
    const r = paletteResults();
    if (e.key === 'Escape') { e.preventDefault(); closePalette(); }
    else if (e.key === 'ArrowDown') { e.preventDefault(); state.paletteSel = Math.min(state.paletteSel + 1, r.length - 1); renderPalette(); document.getElementById('palette-input')?.focus(); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); state.paletteSel = Math.max(state.paletteSel - 1, 0); renderPalette(); document.getElementById('palette-input')?.focus(); }
    else if (e.key === 'Enter' && r[state.paletteSel]) { e.preventDefault(); navOpen({ kind: 'node', id: r[state.paletteSel].id }); closePalette(); }
  });
  document.querySelectorAll('.palette-row').forEach(el => {
    el.addEventListener('click', () => {
      const i = +el.dataset.i;
      const r = paletteResults();
      if (r[i]) { navOpen({ kind: 'node', id: r[i].id }); closePalette(); }
    });
  });
}
